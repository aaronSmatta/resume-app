/* ── Utils ────────────────────────────────────────────────────────────────── */
const uid = () => Math.random().toString(36).slice(2, 10);

const fmt = (ds) => {
  if (!ds) return '';
  return new Date(ds + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};
const fmtBday = (ds) => {
  if (!ds) return '';
  // Support "MM-DD" (new) and legacy "YYYY-MM-DD"
  const p = ds.split('-');
  const mo = parseInt(p.length === 3 ? p[1] : p[0], 10) - 1;
  const dy = parseInt(p.length === 3 ? p[2] : p[1], 10);
  return new Date(2000, mo, dy).toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
};
const daysSince = (ds) => {
  if (!ds) return Infinity;
  return Math.floor((Date.now() - new Date(ds + 'T12:00:00')) / 86400000);
};
const initials = (name = '') => name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0,2) || '?';
const COLORS = ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#14b8a6','#f97316'];
const avatarColor = (name='') => COLORS[name.charCodeAt(0) % COLORS.length] || COLORS[0];
const lastConvDate = (p) => p.conversations?.length
  ? [...p.conversations].sort((a,b) => b.date.localeCompare(a.date))[0].date
  : null;
const getStatus = (p) => {
  if (!p.followUpEnabled) return 'off';
  const last = lastConvDate(p);
  if (!last) return 'new';
  const d = daysSince(last), t = p.followUpDays || 60;
  if (d > t) return 'overdue';
  if (d > t * 0.75) return 'soon';
  return 'ok';
};
const STATUS_COLOR = { off:'#d1d5db', new:'#60a5fa', ok:'#34d399', soon:'#fbbf24', overdue:'#f87171' };
const STATUS_LABEL = { off:'', new:'New contact', ok:'Up to date', soon:'Follow up soon', overdue:'Overdue — reach out!' };

const daysUntilBirthday = (birthdayStr) => {
  if (!birthdayStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const p = birthdayStr.split('-');
  const mo = parseInt(p.length === 3 ? p[1] : p[0], 10) - 1;
  const dy = parseInt(p.length === 3 ? p[2] : p[1], 10);
  let next = new Date(today.getFullYear(), mo, dy);
  if (next < today) next = new Date(today.getFullYear()+1, mo, dy);
  return Math.floor((next - today) / 86400000);
};

/* ── Resume Brief Generator ───────────────────────────────────────────────── */
const buildResumeBrief = (person) => {
  const sorted = [...(person.conversations||[])].sort((a,b)=>b.date.localeCompare(a.date));
  if (!sorted.length) return null;

  const latest = sorted[0];
  const daysAgo = daysSince(latest.date);
  const firstName = person.name.split(' ')[0];

  // Human-readable time since last chat
  let timeStr;
  if (daysAgo === 0) timeStr = 'today';
  else if (daysAgo === 1) timeStr = 'yesterday';
  else if (daysAgo < 7) timeStr = `${daysAgo} days ago`;
  else if (daysAgo < 14) timeStr = 'last week';
  else if (daysAgo < 30) timeStr = `${Math.round(daysAgo/7)} weeks ago`;
  else if (daysAgo < 50) timeStr = 'about a month ago';
  else if (daysAgo < 75) timeStr = 'about 6 weeks ago';
  else if (daysAgo < 365) timeStr = `${Math.round(daysAgo/30)} months ago`;
  else timeStr = 'over a year ago';

  // Build synopsis: where + when + what was on their mind
  const lines = [];
  const where = latest.location ? ` at ${latest.location}` : '';
  lines.push(`You last connected ${timeStr}${where}.`);

  if (latest.insights) {
    // Take the first sentence/clause that's substantive
    const sentences = latest.insights.split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(s=>s.length>15);
    if (sentences[0]) {
      const snippet = sentences[0].length > 120 ? sentences[0].slice(0,117)+'…' : sentences[0];
      lines.push(snippet.endsWith('.') || snippet.endsWith('…') ? snippet : snippet + '.');
    }
  }

  // Count open items across the last 2 conversations
  const recentConvs = sorted.slice(0, 2);
  const openQs = recentConvs.flatMap(c=>c.openQuestions||[]);
  const followUps = recentConvs.flatMap(c=>c.followUps||[]);
  const totalOpen = openQs.length + followUps.length;
  if (totalOpen > 0) {
    lines.push(`There ${totalOpen===1?'is':'are'} ${totalOpen} open ${totalOpen===1?'item':'items'} to pick back up on.`);
  }

  // Pick-up items: questions first, then follow-ups, max 4 total
  const pickUpOn = [];
  openQs.slice(0,3).forEach(q => pickUpOn.push({ type:'question', text:q }));
  followUps.slice(0, Math.max(1, 4-pickUpOn.length)).forEach(f => pickUpOn.push({ type:'followup', text:f }));

  // Conversation starters (contextual suggestions)
  const starters = [];

  // Birthday alert
  if (person.birthday) {
    const bp = person.birthday.split('-');
    const bMo = parseInt(bp.length === 3 ? bp[1] : bp[0], 10) - 1;
    const bDy = parseInt(bp.length === 3 ? bp[2] : bp[1], 10);
    const now = new Date();
    let next = new Date(now.getFullYear(), bMo, bDy);
    if (next < now) next.setFullYear(now.getFullYear()+1);
    const daysUntil = Math.floor((next-now)/86400000);
    if (daysUntil <= 21) starters.push(`🎂 Birthday ${daysUntil===0?'is today':daysUntil<=7?'this week':`in ${daysUntil} days`} — wish them a happy one!`);
  }

  // SO mention
  if (person.so) {
    const recentMention = latest.insights?.toLowerCase().includes(person.so.toLowerCase());
    starters.push(recentMention ? `Ask how ${person.so} is doing — they came up last time.` : `Check in on ${person.so}.`);
  }

  // Hobbies as natural starters
  if (person.hobbies?.length) {
    starters.push(`Catch up on their ${person.hobbies[0]}.`);
    if (person.hobbies[1] && starters.length < 3) starters.push(`Their interest in ${person.hobbies[1]} could be a good thread.`);
  }

  // Long-gap suggestion
  if (daysAgo > 150 && starters.length < 3) starters.push("A lot may have changed — do a broad life update first.");

  // Suggest a topic you've talked about before but not recently
  const allTopics = sorted.flatMap(c=>c.topics||[]);
  const recentTopicSet = new Set(latest.topics||[]);
  const olderTopics = [...new Set(allTopics.filter(t=>!recentTopicSet.has(t)))];
  if (olderTopics.length && starters.length < 3) starters.push(`Revisit "${olderTopics[0]}" — a topic from a previous conversation.`);

  return {
    synopsis: lines.join(' '),
    pickUpOn: pickUpOn.slice(0,4),
    starters: starters.slice(0,3),
    lastDate: latest.date,
    daysAgo,
  };
};

};

/* ── TagInput ─────────────────────────────────────────────────────────────── */
const TagInput = ({ tags=[], onChange, placeholder='Add, press Enter...' }) => {
  const [val, setVal] = useState('');
  const add = () => { const t = val.trim(); if (t && !tags.includes(t)) onChange([...tags, t]); setVal(''); };
  return (
    <div style={{ display:'flex', flexWrap:'wrap', gap:6, alignItems:'center', padding:'7px 10px', border:'1px solid #e5e7eb', borderRadius:8, background:'white', minHeight:40 }}>
      {tags.map(t => (
        <span key={t} style={{ display:'inline-flex', alignItems:'center', gap:3, padding:'2px 8px', background:'#eef2ff', color:'#4f46e5', borderRadius:99, fontSize:13 }}>
          {t}
          <button onClick={() => onChange(tags.filter(x=>x!==t))} style={{ background:'none', border:'none', cursor:'pointer', color:'#6366f1', lineHeight:1, fontSize:16, padding:0, marginLeft:1 }}>×</button>
        </span>
      ))}
      <input value={val} onChange={e=>setVal(e.target.value)}
        onKeyDown={e=>{ if(e.key==='Enter'||e.key===','){e.preventDefault();add();} }}
        onBlur={add}
        placeholder={tags.length ? '' : placeholder}
        style={{ border:'none', outline:'none', flex:1, minWidth:80, fontSize:14, background:'transparent', color:'#374151' }} />
    </div>
  );
};

  const status = getStatus(person);

    const counts = {};
    sorted.flatMap(c=>c.topics||[]).forEach(t=>{ counts[t]=(counts[t]||0)+1; });
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);

  return (
    <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>

            <span style={{ fontSize:13, color: status==='overdue'?'#991b1b':status==='new'?'#1e40af':'#92400e' }}>

              {status==='new' && 'New contact — log your first conversation when you get a chance.'}

          <Card title={`Themes across ${sorted.length} conversations`}>

        <div>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
            <h3 style={{ fontSize:12, fontWeight:700, color:'#9ca3af', textTransform:'uppercase', letterSpacing:'0.06em' }}>
              Conversations ({sorted.length})

          </div>
          {sorted.length === 0 ? (
            <div style={{ textAlign:'center', padding:'36px 20px' }}>
              <Icon name="msg" size={32} color="#e5e7eb" />
              <p style={{ marginTop:8, fontSize:14, color:'#9ca3af' }}>No conversations logged yet</p>

/* ── Deep Search ──────────────────────────────────────────────────────────── */
const FIELD_PRIORITY = { name:0, company:1, role:2, howMet:3, location:4, topic:5, insights:6, hobbies:7, notes:8, openQuestion:9, followUp:10, hometown:11, so:12 };

const deepSearch = (people, query) => {
  if (!query.trim()) return [];
  const q = query.toLowerCase().trim();
  const results = [];

  for (const person of people) {
    const raw = [];

    // Profile fields
    const tryProfile = (field, text, icon) => {
      if (text?.toLowerCase().includes(q)) raw.push({ field, text, icon });
    };
    tryProfile('name', person.name, '👤');
    tryProfile('company', person.company, '🏢');
    tryProfile('role', person.role, '💼');
    tryProfile('howMet', person.howMet, '🤝');
    tryProfile('hometown', person.hometown, '🏠');
    if (person.so?.toLowerCase().includes(q)) raw.push({ field:'so', text:`Partner: ${person.so}`, icon:'❤️' });
    if (person.hobbies?.some(h=>h.toLowerCase().includes(q))) {
      raw.push({ field:'hobbies', text: person.hobbies.filter(h=>h.toLowerCase().includes(q)).join(', '), icon:'🎯' });
    }

    // Conversation fields
    for (const conv of (person.conversations||[])) {
      const tryConv = (field, text, icon) => {
        if (!text?.toLowerCase().includes(q)) return;
        let snippet = text;
        if (text.length > 85) {
          const idx = text.toLowerCase().indexOf(q);
          const start = Math.max(0, idx - 20);
          const end = Math.min(text.length, idx + q.length + 45);
          snippet = (start>0?'…':'') + text.slice(start, end) + (end<text.length?'…':'');
        }
        raw.push({ field, text: snippet, icon, date: conv.date });
      };
      tryConv('location', conv.location, '📍');
      conv.topics?.forEach(t => { if(t.toLowerCase().includes(q)) raw.push({ field:'topic', text:t, icon:'💬', date:conv.date }); });
      tryConv('insights', conv.insights, '💡');
      tryConv('notes', conv.notes, '📝');
      conv.openQuestions?.forEach(oq => { if(oq.toLowerCase().includes(q)) raw.push({ field:'openQuestion', text:oq, icon:'❓', date:conv.date }); });
      conv.followUps?.forEach(fu => { if(fu.toLowerCase().includes(q)) raw.push({ field:'followUp', text:fu, icon:'→', date:conv.date }); });
    }

    if (!raw.length) continue;

    // Sort by priority, deduplicate by field, take top 2
    raw.sort((a,b)=>(FIELD_PRIORITY[a.field]??99)-(FIELD_PRIORITY[b.field]??99));
    const seen = new Set();
    const top = raw.filter(m=>{ if(seen.has(m.field)) return false; seen.add(m.field); return true; }).slice(0,2);
    results.push({ person, matches: top });
  }

  // Best-match-first: sort by top match field priority
  return results.sort((a,b)=>(FIELD_PRIORITY[a.matches[0]?.field]??99)-(FIELD_PRIORITY[b.matches[0]?.field]??99));
};

// Inline text highlighter — wraps the matched substring in a yellow mark
const Highlight = ({ text, query }) => {
  if (!text || !query) return <span>{text}</span>;
  const q = query.toLowerCase();
  const idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return <span>{text}</span>;
  return (
    <span>
      {text.slice(0, idx)}
      <mark style={{ background:'#fef08a', color:'inherit', borderRadius:2, padding:'0 1px' }}>{text.slice(idx, idx+query.length)}</mark>
      {text.slice(idx+query.length)}
    </span>
  );
};

/* ── Natural Language Parser ──────────────────────────────────────────────── */
const parseNaturalInput = (text, people) => {
  const lower = text.toLowerCase();

  // Match existing person (longer names first to avoid partial matches)
  let matchedPerson = null;
  const sortedPeople = [...people].sort((a, b) => b.name.length - a.name.length);
  for (const p of sortedPeople) {
    const parts = p.name.split(/\s+/);
    const checks = [p.name.toLowerCase(), ...parts.filter(n => n.length >= 3).map(n => n.toLowerCase())];
    if (checks.some(n => lower.includes(n))) { matchedPerson = p; break; }
  }

  // Extract new person name
  let newName = '';
  if (!matchedPerson) {
    const namePats = [
      /(?:just )?met\s+(?:with\s+)?([A-Z][a-z]+(?: [A-Z][a-z]+)+)/,
      /(?:talking|talked|chatting|chatted|caught up|lunch|coffee|dinner|call\s+with|spoke(?:n)?\s+with)\s+with\s+([A-Z][a-z]+(?: [A-Z][a-z]+)+)/,
      /^([A-Z][a-z]+(?: [A-Z][a-z]+)+)\s*[-–—:,]/,
      /(?:new\s+contact|add(?:ing)?(?:\s+a)?(?:\s+new)?\s+contact|creat(?:e|ing)(?:\s+a)?(?:\s+new)?\s+contact)\s+(?:for\s+)?([A-Z][a-z]+(?: [A-Z][a-z]+)+)/i,
      /\bfor\s+([A-Z][a-z]+(?: [A-Z][a-z]+)+)\b/,
    ];
    for (const rx of namePats) {
      const m = text.match(rx);
      if (m) { newName = m[1].trim(); break; }
    }
  }

  // Intent
  const hasUpdateKeyword = /^(update\b|add\s+that\b|remember\s+that\b|note\s+that\b|also\s+note\b|fyi\b)/i.test(text.trim());
  const hasConvKeyword = /\b(talked?|chatted?|caught\s+up|coffee|lunch|dinner|drinks?|zoom|phone\s+call|video\s+call|call|spoke|spoken|met\s+with|had\s+a\s+(?:meeting|chat|call))\b/i.test(text);
  const intent = hasUpdateKeyword && matchedPerson ? 'update'
    : matchedPerson ? 'conversation'
    : newName ? 'new_person'
    : 'unclear';

  // Date
  let date = new Date().toISOString().slice(0, 10);
  let dateLabel = 'today';
  if (/\byesterday\b/i.test(text)) {
    const d = new Date(); d.setDate(d.getDate() - 1);
    date = d.toISOString().slice(0, 10); dateLabel = 'yesterday';
  } else if (/\blast\s+week\b/i.test(text)) {
    const d = new Date(); d.setDate(d.getDate() - 7);
    date = d.toISOString().slice(0, 10); dateLabel = 'last week';
  } else if (/\b(?:a\s+)?(?:couple|few)\s+(?:days|weeks)\s+ago\b/i.test(text)) {
    const d = new Date(); d.setDate(d.getDate() - 4);
    date = d.toISOString().slice(0, 10); dateLabel = 'a few days ago';
  }

  // Location
  let location = '';
  if (/\bon\s+(?:a\s+)?zoom(?:\s+call)?\b/i.test(text)) location = 'Zoom';
  else if (/\bon\s+(?:a\s+)?(?:phone|video)\s+call\b/i.test(text)) location = 'Phone call';
  else if (/\bvirtually\b/i.test(text)) location = 'Virtual';
  else {
    const locPats = [
      /\bover\s+(?:coffee|lunch|dinner|drinks?)\s+at\s+([A-Z][A-Za-z'&\s]{2,28?})(?=[,.]|\s+(?:about|we|he|she|they|I|and|to))/i,
      /\b(?:coffee|lunch|dinner|drinks?)\s+at\s+([A-Z][A-Za-z'&\s]{2,28?})(?=[,.]|\s+(?:about|we|he|she|they|I|and|to))/i,
      /\bat\s+([A-Z][A-Za-z'&\s]{2,28?})(?=[,.]|\s+(?:about|we|he|she|they|I|and|to|for|over|on|with))/,
    ];
    for (const rx of locPats) {
      const m = text.match(rx);
      if (m && m[1]) { location = m[1].trim().replace(/\s+$/, ''); break; }
    }
  }

  // Topics
  let topics = [];
  const topicRx = /(?:talked?\s+about|chatted?\s+about|spoke\s+about|discussed?|went\s+(?:over|through)|covered|touched\s+on|about)\s+([^.!?\n]{4,100})/gi;
  for (const m of text.matchAll(topicRx)) {
    m[1].split(/,\s*|\s+and\s+/)
      .map(s => s.trim().replace(/[.,!?]$/, ''))
      .filter(s => s.length > 2 && s.length < 60 && !/^(he|she|they|we|his|her|their|the|a|an|it|this|that|which|who|how|what|when|where|why)\b/i.test(s))
      .slice(0, 3)
      .forEach(t => topics.push(t));
  }
  topics = [...new Set(topics)].slice(0, 6);

  // Company
  let company = '';
  const coM = text.match(/\b(?:works?\s+(?:at|for)|joining|joined|left|starting\s+(?:a\s+)?(?:new\s+)?(?:company|startup|firm)\s+(?:called|named)\s+)\s*([A-Z][A-Za-z]+(?:\s+[A-Z][A-Za-z]+)?)/);
  if (coM) company = coM[1];

  // Role
  let role = '';
  const roleM = text.match(/\b(?:she(?:'s|\s+is)?\s+(?:a|an|the)|he(?:'s|\s+is)?\s+(?:a|an|the)|is\s+(?:a|an|the)|works?\s+as\s+(?:a|an))\s+([A-Za-z]+(?:\s+[A-Za-z]+){0,3}?)(?=\s+at|\s+for|[,.]|\s*$)/i);
  if (roleM) role = roleM[1].trim();

  // Significant other
  let so = '';
  const soM = text.match(/\b(?:wife|husband|partner|SO|boyfriend|girlfriend|fianc[ée]|spouse)\s+(?:is\s+|named?\s+)?([A-Z][a-z]+)/i)
    || text.match(/\bmarried\s+to\s+([A-Z][a-z]+)/i)
    || text.match(/\b(?:her|his)\s+(?:husband|wife|partner|boyfriend|girlfriend)\s+(?:is\s+)?([A-Z][a-z]+)/i);
  if (soM) so = soM[1];

  // Kids
  let kids = [];
  const kidsNameRx = /\b(?:kids?|children|son|daughter|boys?|girls?)\s+(?:are?\s+named?|(?:is|are)\s+called|named?)\s+([A-Z][a-z]+(?:(?:\s*,\s*|\s+and\s+)[A-Z][a-z]+)*)/gi;
  for (const m of text.matchAll(kidsNameRx)) {
    m[1].split(/,\s*|\s+and\s+/).map(s=>s.trim()).filter(Boolean).forEach(k=>kids.push(k));
  }
  const kidsHasRx = /\bhas\s+(?:a\s+)?(?:son|daughter|two\s+kids?|three\s+kids?|[0-9]+\s+kids?)[^.]*?named?\s+([A-Z][a-z]+(?:(?:\s*,\s*|\s+and\s+)[A-Z][a-z]+)*)/gi;
  for (const m of text.matchAll(kidsHasRx)) {
    m[1].split(/,\s*|\s+and\s+/).map(s=>s.trim()).filter(Boolean).forEach(k=>kids.push(k));
  }
  kids = [...new Set(kids)].slice(0, 6);

  // Hometown
  let hometown = '';
  const htM = text.match(/\b(?:from|grew\s+up\s+in|originally\s+from|based\s+in|hometown\s+is)\s+([A-Z][A-Za-z\s,]{2,35?})(?=[.,\n]|$)/i);
  if (htM) hometown = htM[1].trim().replace(/[.,]$/, '').slice(0, 40);

  // Hobbies
  let hobbies = [];
  const hobbyRx = /\b(?:likes?\s+(?:to\s+)?|loves?\s+(?:to\s+)?|is\s+(?:big\s+)?into\s+|enjoys?\s+|passionate\s+about\s+|big\s+(?:fan\s+of|into)\s+|hobbies?\s+(?:include|is|are)\s+)([^.!?\n]{3,60})/gi;
  for (const m of text.matchAll(hobbyRx)) {
    m[1].split(/,\s*|\s+and\s+/).map(s => s.trim().replace(/[.,!?]$/, '')).filter(s => s.length > 1 && s.length < 35).forEach(h => hobbies.push(h));
  }
  hobbies = [...new Set(hobbies)].slice(0, 5);

  // Birthday — parse "birthday is March 15", "born on March 15", "bday June 3", etc. → "MM-DD"
  let birthday = '';
  const BMONTHS = { january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12,
    jan:1,feb:2,mar:3,apr:4,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12 };
  const bdRxList = [
    /\b(?:birthday|bday)\s+(?:is\s+|on\s+)?([A-Za-z]+)\s+(\d{1,2})(?:st|nd|rd|th)?\b/i,
    /\b(?:birthday|bday)\s+(?:is\s+|on\s+)?(\d{1,2})(?:st|nd|rd|th)?\s+(?:of\s+)?([A-Za-z]+)/i,
    /\bborn(?:\s+on)?\s+([A-Za-z]+)\s+(\d{1,2})(?:st|nd|rd|th)?\b/i,
    /\bborn(?:\s+on)?\s+(\d{1,2})(?:st|nd|rd|th)?\s+(?:of\s+)?([A-Za-z]+)/i,
  ];
  for (const rx of bdRxList) {
    const m = text.match(rx);
    if (m) {
      let mo, dy;
      if (isNaN(parseInt(m[1], 10))) { mo = BMONTHS[m[1].toLowerCase()]; dy = parseInt(m[2], 10); }
      else { dy = parseInt(m[1], 10); mo = BMONTHS[m[2].toLowerCase()]; }
      if (mo && dy && dy >= 1 && dy <= 31) {
        birthday = String(mo).padStart(2,'0') + '-' + String(dy).padStart(2,'0'); break;
      }
    }
  }

  // Open questions
  let openQuestions = [];
  const oqRx = /\b(?:not\s+sure|still\s+(?:waiting|wondering)|wondering|need\s+to\s+(?:find\s+out|ask|check|clarify)|want\s+to\s+(?:know|ask|clarify)|curious\s+(?:about|if|whether))\s+([^.!?\n]{5,100})/gi;
  for (const m of text.matchAll(oqRx)) openQuestions.push(m[1].trim().replace(/[.,]$/, ''));
  openQuestions = [...new Set(openQuestions)].slice(0, 3);

  // Follow-ups
  let followUps = [];
  const fuRx = /\b(?:need\s+to|want\s+to|going\s+to|should|plan\s+to|I'll|will|have\s+to)\s+(?:send|share|intro(?:duce)?|connect|follow\s+up|reach\s+out|check\s+in|look\s+into|get|put\s+together|forward|introduce)\b([^.!?\n]{0,70})/gi;
  for (const m of text.matchAll(fuRx)) {
    const action = m[0].trim().replace(/[.,]$/, '').replace(/\s+/g, ' ');
    if (action.length > 8) followUps.push(action);
  }
  followUps = [...new Set(followUps)].slice(0, 3);

  return { intent, matchedPerson, newName, date, dateLabel, location, topics, company, role, so, kids, birthday, hometown, hobbies, openQuestions, followUps, insights: text.trim() };
};

const QuickCapture = ({ people, onSaveConvToPersonId, onSavePerson, onUpdatePersonFields, onClose }) => {
  const [text, setText] = useState('');
  const [parsed, setParsed] = useState(null);
  const [editedParsed, setEditedParsed] = useState(null);
  const [saved, setSaved] = useState(false);
  const [listening, setListening] = useState(false);
  const textRef = React.useRef(null);
  const recognitionRef = React.useRef(null);

  React.useEffect(() => { setTimeout(() => textRef.current?.focus(), 50); }, []);

  const toggleMic = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Speech recognition is not supported in this browser. Try Chrome or Edge.'); return; }

    if (listening) {
      recognitionRef.current?.stop();
      setListening(false);
      return;
    }

    const rec = new SR();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = 'en-US';
    recognitionRef.current = rec;

    let finalTranscript = text;
    rec.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) { finalTranscript += (finalTranscript ? ' ' : '') + t; }
        else { interim = t; }
      }
      setText(finalTranscript + (interim ? ' ' + interim : ''));
    };
    rec.onend = () => { setText(finalTranscript); setListening(false); };
    rec.onerror = (e) => { console.warn('Speech error:', e.error); setListening(false); };

    rec.start();
    setListening(true);
  };

  React.useEffect(() => {
    return () => { recognitionRef.current?.stop(); };
  }, []);

  const handleParse = () => {
    if (!text.trim()) return;
    const result = parseNaturalInput(text.trim(), people);
    setParsed(result);
    setEditedParsed({ ...result });
  };

  const handleSave = () => {
    if (!editedParsed || editedParsed.intent === 'unclear') return;
    const ep = editedParsed;

    const conv = {
      id: uid(), date: ep.date, location: ep.location || '',
      topics: ep.topics, insights: ep.insights,
      openQuestions: ep.openQuestions, followUps: ep.followUps,
      notes: '', nextMeeting: '', nextMeetingNote: '',
    };

    if (ep.intent === 'conversation' && ep.matchedPerson) {
      onSaveConvToPersonId(ep.matchedPerson.id, conv);
    } else if (ep.intent === 'new_person') {
      // Normalize birthday: accept "March 15" style in the editable field too
      const normBday = (raw) => {
        if (!raw) return '';
        if (/^\d{2}-\d{2}$/.test(raw)) return raw; // already MM-DD
        const BMONTHS = { january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12,
          jan:1,feb:2,mar:3,apr:4,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12 };
        const m = raw.match(/^([A-Za-z]+)\s+(\d{1,2})$/) || raw.match(/^(\d{1,2})\s+([A-Za-z]+)$/);
        if (m) {
          let mo, dy;
          if (isNaN(parseInt(m[1], 10))) { mo = BMONTHS[m[1].toLowerCase()]; dy = parseInt(m[2], 10); }
          else { dy = parseInt(m[1], 10); mo = BMONTHS[m[2].toLowerCase()]; }
          if (mo && dy) return String(mo).padStart(2,'0') + '-' + String(dy).padStart(2,'0');
        }
        return raw;
      };
      onSavePerson({
        id: uid(), name: ep.newName, role: ep.role || '',
        company: ep.company || '', howMet: ep.location || '',
        hometown: ep.hometown || '', so: ep.so || '',
        kids: ep.kids || [], birthday: normBday(ep.birthday), hobbies: ep.hobbies || [],
        groups: [], followUpEnabled: true, followUpDays: 60,
        additionalInfo: '',
        createdAt: new Date().toISOString().slice(0, 10),
        conversations: [conv],
      });
    } else if (ep.intent === 'update' && ep.matchedPerson) {
      const normBday = (raw) => {
        if (!raw) return undefined;
        if (/^\d{2}-\d{2}$/.test(raw)) return raw;
        const BMONTHS = { january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12,
          jan:1,feb:2,mar:3,apr:4,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12 };
        const m = raw.match(/^([A-Za-z]+)\s+(\d{1,2})$/) || raw.match(/^(\d{1,2})\s+([A-Za-z]+)$/);
        if (m) {
          let mo, dy;
          if (isNaN(parseInt(m[1], 10))) { mo = BMONTHS[m[1].toLowerCase()]; dy = parseInt(m[2], 10); }
          else { dy = parseInt(m[1], 10); mo = BMONTHS[m[2].toLowerCase()]; }
          if (mo && dy) return String(mo).padStart(2,'0') + '-' + String(dy).padStart(2,'0');
        }
        return raw;
      };
      const updateFields = { role: ep.role, company: ep.company, hometown: ep.hometown,
        so: ep.so, kids: ep.kids, hobbies: ep.hobbies };
      const nb = normBday(ep.birthday);
      if (nb) updateFields.birthday = nb;
      onUpdatePersonFields(ep.matchedPerson.id, updateFields);
    }

    setSaved(true);
    setTimeout(onClose, 1600);
  };

  const handleReset = () => { setText(''); setParsed(null); setEditedParsed(null); };
  // Clear parse result only — keeps text so user can tweak and re-parse
  const handleReparse = () => { setParsed(null); setEditedParsed(null); };

  const canSave = editedParsed && editedParsed.intent !== 'unclear';

  const savedMsg = !editedParsed ? '' :
    editedParsed.intent === 'conversation' ? `Conversation added to ${editedParsed.matchedPerson?.name}` :
    editedParsed.intent === 'new_person' ? `${editedParsed.newName} added to your contacts` :
    editedParsed.intent === 'update' ? `${editedParsed.matchedPerson?.name}'s profile updated` : 'Saved';

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:200, padding:20 }}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background:'white', borderRadius:16, width:'100%', maxWidth:580, maxHeight:'90vh', overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'0 24px 64px rgba(0,0,0,0.18)' }}>

        {/* Header */}
        <div style={{ padding:'18px 22px 14px', borderBottom:'1px solid #f3f4f6', display:'flex', alignItems:'flex-start', justifyContent:'space-between', flexShrink:0 }}>
          <div>
            <h2 style={{ fontSize:17, fontWeight:800, color:'#111827', display:'flex', alignItems:'center', gap:8 }}>
              <Icon name="pen" size={16} color="#6366f1" /> Quick capture
            </h2>
            <p style={{ fontSize:12, color:'#9ca3af', marginTop:3 }}>Type what you remember — I'll pull out the key details</p>
          </div>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'#9ca3af', padding:4, display:'flex', alignItems:'center' }}>
            <Icon name="x" size={18} color="currentColor" />
          </button>
        </div>

        {/* Body */}
        <div style={{ flex:1, overflowY:'auto', padding:'16px 22px', display:'flex', flexDirection:'column', gap:12 }}>
          {/* Editable parsed result */}
          {parsed && editedParsed && !saved && (
            <EditableParsed parsed={parsed} ep={editedParsed} onChange={setEditedParsed} />
          )}

          {/* Success */}
          {saved && (
            <div style={{ textAlign:'center', padding:'36px 0' }}>
              <div style={{ fontSize:48, marginBottom:12 }}>✅</div>
              <p style={{ fontSize:16, fontWeight:700, color:'#111827' }}>Saved!</p>
              <p style={{ fontSize:13, color:'#9ca3af', marginTop:5 }}>{savedMsg}</p>
            </div>
          )}
        </div>

        {/* Input + actions */}
        {!saved && (
          <div style={{ padding:'14px 22px 20px', borderTop:'1px solid #f3f4f6', flexShrink:0 }}>
            <div style={{ position:'relative' }}>
              <textarea ref={textRef} value={text} onChange={e => setText(e.target.value)} rows={4}
                placeholder={"What do you remember? (or tap the mic and speak)"}
                style={{ width:'100%', padding:'11px 42px 11px 13px', border:'1px solid #e5e7eb', borderRadius:10, fontSize:13, lineHeight:'1.55', resize:'vertical', color:'#374151', background:'#fafafa', fontFamily:'inherit', boxSizing:'border-box', outline:'none', transition:'border-color 0.15s' }}
                onFocus={e => e.currentTarget.style.borderColor = listening ? '#f87171' : '#a5b4fc'}
                onBlur={e => e.currentTarget.style.borderColor = listening ? '#f87171' : '#e5e7eb'}
                onKeyDown={e => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); parsed ? handleSave() : handleParse(); } }}
              />
              <button onClick={toggleMic} title={listening ? 'Stop dictation' : 'Start dictation'}
                style={{ position:'absolute', top:10, right:10, padding:6, borderRadius:7, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', background: listening ? '#ef4444' : '#f3f4f6', color: listening ? 'white' : '#6b7280', animation: listening ? 'micPulse 1.2s ease-in-out infinite' : 'none', transition:'background 0.15s, color 0.15s' }}
                onMouseEnter={e => { if (!listening) { e.currentTarget.style.background='#e5e7eb'; } }}
                onMouseLeave={e => { if (!listening) { e.currentTarget.style.background='#f3f4f6'; } }}>
                <Icon name="mic" size={16} color="currentColor" />
              </button>
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:10 }}>
              <span style={{ fontSize:11, color:'#d1d5db' }}>⌘↵ to {parsed ? 'save' : 'parse'}</span>
              <div style={{ display:'flex', gap:8 }}>
                {parsed && (<>
                  <button onClick={handleReparse}
                    title="Edit your text and try parsing again"
                    style={{ padding:'7px 14px', background:'#f0f9ff', border:'1px solid #bae6fd', borderRadius:8, fontSize:13, color:'#0369a1', cursor:'pointer', fontWeight:500, transition:'background 0.1s' }}
                    onMouseEnter={e => e.currentTarget.style.background = '#e0f2fe'}
                    onMouseLeave={e => e.currentTarget.style.background = '#f0f9ff'}>
                    ↺ Re-parse
                  </button>
                  <button onClick={handleReset}
                    title="Clear everything and start fresh"
                    style={{ padding:'7px 14px', background:'#f9fafb', border:'1px solid #e5e7eb', borderRadius:8, fontSize:13, color:'#6b7280', cursor:'pointer', fontWeight:500, transition:'background 0.1s' }}
                    onMouseEnter={e => e.currentTarget.style.background = '#f3f4f6'}
                    onMouseLeave={e => e.currentTarget.style.background = '#f9fafb'}>
                    ✕ Clear
                  </button>
                </>)}
                {!parsed ? (
                  <button onClick={handleParse} disabled={!text.trim()}
                    style={{ padding:'7px 20px', background: text.trim() ? '#6366f1' : '#e5e7eb', color: text.trim() ? 'white' : '#9ca3af', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor: text.trim() ? 'pointer' : 'default', transition:'all 0.15s' }}>
                    Parse →
                  </button>
                ) : (
                  <button onClick={handleSave} disabled={!canSave}
                    style={{ padding:'7px 20px', background: canSave ? '#6366f1' : '#e5e7eb', color: canSave ? 'white' : '#9ca3af', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor: canSave ? 'pointer' : 'default' }}>
                    Save →
                  </button>
                )}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ── Sidebar ──────────────────────────────────────────────────────────────── */
const Sidebar = ({ people, selectedId, onSelect, onAddPerson, onQuickCapture, search, setSearch, sortBy, setSortBy, saveStatus }) => {
  const [activeGroup, setActiveGroup] = useState(null);
  const overdueCount = people.filter(p=>getStatus(p)==='overdue').length;
  const isSearching = search.trim().length > 0;

  // All unique groups sorted alphabetically
  const allGroups = useMemo(() => {
    const s = new Set(people.flatMap(p=>p.groups||[]));
    return [...s].sort();
  }, [people]);

  const filtered = useMemo(() => {
    if (isSearching) return [];
    let list = [...people];
    if (activeGroup) list = list.filter(p=>p.groups?.includes(activeGroup));
    if (sortBy==='name') return list.sort((a,b)=>a.name.localeCompare(b.name));
    if (sortBy==='recent') return list.sort((a,b)=>(lastConvDate(b)||'0').localeCompare(lastConvDate(a)||'0'));
    if (sortBy==='attention') {
      const order = { overdue:0, soon:1, new:2, ok:3, off:4 };
      return list.sort((a,b)=>(order[getStatus(a)]||5)-(order[getStatus(b)]||5));
    }
    return list;
  }, [people, sortBy, isSearching, activeGroup]);

  const searchResults = useMemo(() => {
    const results = isSearching ? deepSearch(people, search) : [];
    return activeGroup ? results.filter(r=>r.person.groups?.includes(activeGroup)) : results;
  }, [people, search, isSearching, activeGroup]);

  return (
    <div style={{ width:300, flexShrink:0, background:'white', borderRight:'1px solid #f0f0f0', display:'flex', flexDirection:'column', height:'100%' }}>
      {/* Header */}
      <div style={{ padding:'18px 16px 12px' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
          <button onClick={() => onSelect(null)} title="Go to dashboard"
            style={{ background:'none', border:'none', cursor:'pointer', padding:0, textAlign:'left', transition:'opacity 0.15s' }}
            onMouseEnter={e=>e.currentTarget.style.opacity='0.75'}
            onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
            <div style={{ fontSize:22, fontWeight:900, color:'#4f46e5', letterSpacing:'-0.5px', lineHeight:1 }}>▶ Resume</div>
            <div style={{ fontSize:11, color:'#9ca3af', marginTop:2, letterSpacing:'0.03em' }}>Remember what matters</div>
            {saveStatus === 'saving'  && <div style={{ fontSize:10, color:'#6366f1', marginTop:2, display:'flex', alignItems:'center', gap:3 }}><span style={{ display:'inline-block', width:6, height:6, borderRadius:'50%', background:'#6366f1', animation:'pulse 1s infinite' }}></span>Saving…</div>}
            {saveStatus === 'pending' && <div style={{ fontSize:10, color:'#f59e0b', marginTop:2, display:'flex', alignItems:'center', gap:3 }}><span style={{ display:'inline-block', width:6, height:6, borderRadius:'50%', background:'#f59e0b' }}></span>Unsaved changes</div>}
          </button>
          <div style={{ display:'flex', gap:6 }}>
            <button onClick={onQuickCapture} title="Quick capture"
              style={{ width:34, height:34, borderRadius:10, background:'#f0f0ff', border:'1px solid #c7d2fe', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.1s' }}
              onMouseEnter={e=>{ e.currentTarget.style.background='#e0e7ff'; e.currentTarget.style.transform='scale(1.05)'; }}
              onMouseLeave={e=>{ e.currentTarget.style.background='#f0f0ff'; e.currentTarget.style.transform='scale(1)'; }}>
              <Icon name="pen" size={15} color="#6366f1" />
            </button>
            <button onClick={onAddPerson} title="Add contact"
              style={{ width:34, height:34, borderRadius:10, background:'#6366f1', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 2px 8px rgba(99,102,241,0.35)', transition:'transform 0.1s' }}
              onMouseEnter={e=>e.currentTarget.style.transform='scale(1.05)'}
              onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
              <Icon name="plus" size={18} color="white" />
            </button>
          </div>
        </div>
        {/* Search bar */}
        <div style={{ position:'relative' }}>
          <span style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }}>
            <Icon name="search" size={14} color={isSearching?'#6366f1':'#9ca3af'} />
          </span>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search names, places, topics…"
            style={{ width:'100%', padding:'8px 30px 8px 32px', border:`1px solid ${isSearching?'#c7d2fe':'#f0f0f0'}`, borderRadius:8, fontSize:13, background: isSearching?'#f5f3ff':'#f9fafb', color:'#374151', transition:'all 0.15s' }} />
          {isSearching && (
            <button onClick={()=>setSearch('')}
              style={{ position:'absolute', right:8, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:'#9ca3af', display:'flex', alignItems:'center', padding:2 }}
              onMouseEnter={e=>e.currentTarget.style.color='#374151'}
              onMouseLeave={e=>e.currentTarget.style.color='#9ca3af'}>
              <Icon name="x" size={13} color="currentColor" />
            </button>
          )}

          <p style={{ fontSize:11, color:'#d1d5db', marginTop:5, textAlign:'center' }}>

            <option value="name">A – Z</option>
            <option value="attention">Needs attention</option>
          </select>
        </div>

        <div style={{ margin:'8px 10px 0', padding:'8px 12px', background:'#fef2f2', borderRadius:8, border:'1px solid #fecaca', fontSize:12, color:'#991b1b', display:'flex', alignItems:'center', gap:6 }}>

          <>
            {filtered.length === 0 && (
              <p style={{ fontSize:14, color:'#9ca3af', textAlign:'center', marginTop:40 }}>No contacts yet</p>
            )}
            {filtered.map(p => {
              const st = getStatus(p);
              const last = lastConvDate(p);
              const sel = p.id === selectedId;
              return (
                <div key={p.id} className="person-row"
                  onClick={() => onSelect(p.id)}
                  style={{ padding:'9px 10px', borderRadius:10, cursor:'pointer', marginBottom:2, background: sel ? '#eef2ff' : 'transparent', display:'flex', alignItems:'center', gap:10 }}
                  onMouseEnter={e=>{ if(!sel) e.currentTarget.style.background='#f9fafb'; }}
                  onMouseLeave={e=>{ if(!sel) e.currentTarget.style.background='transparent'; }}>
                  <div style={{ position:'relative', flexShrink:0 }}>
                    <Avatar name={p.name} size={38} />
                    {st !== 'off' && (
                      <span style={{ position:'absolute', bottom:0, right:0, width:10, height:10, borderRadius:'50%', background:STATUS_COLOR[st], border:'2px solid white' }} />
                    )}
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <p style={{ fontSize:14, fontWeight:600, color:'#111827', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{p.name}</p>
                    <p style={{ fontSize:12, color:'#9ca3af', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', marginTop:1 }}>
                      {last ? fmt(last) : (p.company || 'No conversations yet')}
                    </p>
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
};

/* ── Calendar Section ─────────────────────────────────────────────────────── */
const CalendarSection = ({ people, onSelectPerson }) => {
  const today = new Date();
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [popoverDay, setPopoverDay] = useState(null);

  // Close popover on outside click
  React.useEffect(() => {
    if (popoverDay === null) return;
    const close = () => setPopoverDay(null);
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, [popoverDay]);

  const prevMonth = () => {
    if (viewMonth === 0) { setViewYear(y => y-1); setViewMonth(11); }
    else setViewMonth(m => m-1);
  };
  const nextMonth = () => {
    if (viewMonth === 11) { setViewYear(y => y+1); setViewMonth(0); }
    else setViewMonth(m => m+1);
  };

  // Collect scheduled meetings + birthdays for the viewed month
  const monthEvents = useMemo(() => {
    const map = {};
    const add = (day, entry) => { if (!map[day]) map[day]=[]; map[day].push(entry); };
    people.forEach(p => {
      // Scheduled meetings
      (p.conversations||[]).forEach(c => {
        if (!c.nextMeeting) return;
        const d = new Date(c.nextMeeting+'T12:00:00');
        if (d.getFullYear()===viewYear && d.getMonth()===viewMonth)
          add(d.getDate(), { person:p, label:c.nextMeetingNote||'Catch-up', type:'meeting' });
      });
      // Birthdays (year-independent)
      if (p.birthday) {
        const bp = p.birthday.split('-');
        const bMo = parseInt(bp.length === 3 ? bp[1] : bp[0], 10) - 1;
        const bDy = parseInt(bp.length === 3 ? bp[2] : bp[1], 10);
        if (bMo === viewMonth)
          add(bDy, { person:p, label:`${p.name.split(' ')[0]}'s birthday 🎂`, type:'birthday' });
      }
    });
    return map;
  }, [people, viewYear, viewMonth]);

  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const monthLabel = new Date(viewYear, viewMonth, 1).toLocaleDateString('en-US', { month:'long', year:'numeric' });
  const isCurrentMonth = viewYear===today.getFullYear() && viewMonth===today.getMonth();

  const cells = [];
  for (let i=0; i<firstDow; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const navBtn = { background:'none', border:'1px solid #e5e7eb', borderRadius:6, width:26, height:26, cursor:'pointer', fontSize:14, color:'#6b7280', display:'flex', alignItems:'center', justifyContent:'center', transition:'background 0.1s' };

  return (
    <div style={{ background:'white', borderRadius:12, padding:'16px 20px', border:'1px solid #f3f4f6', boxShadow:'0 1px 3px rgba(0,0,0,0.05)', marginBottom:14 }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ fontSize:16 }}>📆</span>
          <h3 style={{ fontSize:14, fontWeight:700, color:'#111827' }}>Calendar</h3>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <button style={navBtn} onClick={prevMonth}
            onMouseEnter={e=>e.currentTarget.style.background='#f3f4f6'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>‹</button>
          <span style={{ fontSize:13, fontWeight:600, color:'#374151', minWidth:130, textAlign:'center' }}>{monthLabel}</span>
          <button style={navBtn} onClick={nextMonth}
            onMouseEnter={e=>e.currentTarget.style.background='#f3f4f6'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>›</button>
        </div>
      </div>

      {/* Day-of-week headers */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2, marginBottom:3 }}>
        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
          <div key={d} style={{ textAlign:'center', fontSize:10, fontWeight:700, color:'#c4c8d4', paddingBottom:4, letterSpacing:'0.04em' }}>{d}</div>
        ))}
      </div>

      {/* Day cells */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2 }}>
        {cells.map((day, i) => {
          if (!day) return <div key={i} style={{ height:36 }} />;
          const isToday = isCurrentMonth && day===today.getDate();
          const evts = monthEvents[day]||[];
          const hasMtg = evts.some(e=>e.type==='meeting');
          const hasBday = evts.some(e=>e.type==='birthday');
          const hasEvt = evts.length > 0;
          const isMulti = evts.length > 1;
          const isPopOpen = popoverDay === day;

          const handleDayClick = (e) => {
            e.stopPropagation();
            if (!hasEvt) return;
            if (evts.length === 1) { onSelectPerson(evts[0].person.id); return; }
            setPopoverDay(isPopOpen ? null : day);
          };

          return (
            <div key={i} style={{ position:'relative' }}>
              <div
                onClick={handleDayClick}
                title={!isMulti && evts.length===1 ? evts[0].label : undefined}
                style={{
                  height:36, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                  borderRadius:7, cursor:hasEvt?'pointer':'default',
                  background: isToday?'#4f46e5' : isPopOpen?'#eef2ff' : hasEvt?'#f5f3ff':'transparent',
                  border: isPopOpen&&!isToday ? '1px solid #a5b4fc' : '1px solid transparent',
                  transition:'background 0.1s',
                }}
                onMouseEnter={e=>{ if(hasEvt&&!isToday) e.currentTarget.style.background='#eef2ff'; }}
                onMouseLeave={e=>{ if(hasEvt&&!isToday&&!isPopOpen) e.currentTarget.style.background='#f5f3ff'; if(!hasEvt) e.currentTarget.style.background='transparent'; }}>
                <span style={{ fontSize:12, lineHeight:1, fontWeight:isToday?700:400, color:isToday?'white':hasEvt?'#3730a3':'#374151' }}>{day}</span>
                {(hasMtg||hasBday) && (
                  <div style={{ display:'flex', gap:2, marginTop:2 }}>
                    {hasMtg && <span style={{ width:4, height:4, borderRadius:'50%', background:isToday?'rgba(255,255,255,0.8)':'#6366f1', flexShrink:0 }} />}
                    {hasBday && <span style={{ width:4, height:4, borderRadius:'50%', background:isToday?'rgba(255,255,255,0.8)':'#f97316', flexShrink:0 }} />}
                  </div>
                )}
              </div>

              {/* Multi-event popover */}
              {isPopOpen && (
                <div onClick={e=>e.stopPropagation()}
                  style={{ position:'absolute', top:'calc(100% + 4px)', left:'50%', transform:'translateX(-50%)',
                    zIndex:200, background:'white', borderRadius:10, boxShadow:'0 6px 24px rgba(0,0,0,0.14)',
                    border:'1px solid #e5e7eb', minWidth:180, padding:'4px 0', whiteSpace:'nowrap' }}>
                  {/* Arrow */}
                  <div style={{ position:'absolute', top:-5, left:'50%', transform:'translateX(-50%) rotate(45deg)',
                    width:9, height:9, background:'white', border:'1px solid #e5e7eb', borderBottom:'none', borderRight:'none' }} />
                  {evts.map((ev, ei) => (
                    <button key={ei}
                      onClick={() => { onSelectPerson(ev.person.id); setPopoverDay(null); }}
                      style={{ display:'flex', alignItems:'center', gap:9, width:'100%', padding:'9px 14px',
                        background:'none', border:'none', cursor:'pointer', textAlign:'left', transition:'background 0.1s' }}
                      onMouseEnter={e=>e.currentTarget.style.background='#f9fafb'}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <span style={{ fontSize:14, flexShrink:0 }}>{ev.type==='birthday'?'🎂':'📅'}</span>
                      <div>
                        <p style={{ fontSize:12, fontWeight:600, color:'#111827', lineHeight:1.3 }}>{ev.person.name}</p>
                        <p style={{ fontSize:11, color:'#9ca3af', lineHeight:1.3 }}>{ev.label}</p>
                      </div>
                    </button>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Legend */}
      <div style={{ display:'flex', gap:14, marginTop:12, paddingTop:10, borderTop:'1px solid #f9fafb', justifyContent:'flex-end' }}>
        <div style={{ display:'flex', alignItems:'center', gap:5 }}>
          <span style={{ width:7, height:7, borderRadius:'50%', background:'#6366f1', flexShrink:0 }} />
          <span style={{ fontSize:10, color:'#9ca3af' }}>Scheduled meeting</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:5 }}>
          <span style={{ width:7, height:7, borderRadius:'50%', background:'#f97316', flexShrink:0 }} />
          <span style={{ fontSize:10, color:'#9ca3af' }}>Birthday</span>
        </div>
      </div>
    </div>
  );
};

/* ── Birthday Section ─────────────────────────────────────────────────────── */

/* ── Dashboard ────────────────────────────────────────────────────────────── */
const Dashboard = ({ people, onSelectPerson, onAddPerson, onForgo }) => {
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';

  const allConvs = useMemo(() =>
    people.flatMap(p => (p.conversations||[]).map(c => ({ ...c, person:p })))
      .sort((a,b) => b.date.localeCompare(a.date)),
    [people]
  );

  // Stats
  const now = Date.now();
  const ms30 = 30 * 86400000;
  const convs30 = allConvs.filter(c => now - new Date(c.date+'T12:00:00') < ms30).length;
  const convsPrev30 = allConvs.filter(c => { const d = now - new Date(c.date+'T12:00:00'); return d >= ms30 && d < 2*ms30; }).length;
  const newContacts30 = people.filter(p => p.createdAt && now - new Date(p.createdAt+'T12:00:00') < ms30).length;
  const newContactsPrev30 = people.filter(p => { if (!p.createdAt) return false; const d = now - new Date(p.createdAt+'T12:00:00'); return d >= ms30 && d < 2*ms30; }).length;
  const overdueCount = people.filter(p => getStatus(p) === 'overdue').length;

  // Upcoming (next 30 days), sorted soonest first
  const today0 = new Date(new Date().setHours(0,0,0,0));
  const in30 = new Date(today0.getTime() + 30 * 86400000);
  const upcoming = useMemo(() =>
    allConvs
      .filter(c => {
        if (!c.nextMeeting) return false;
        const d = new Date(c.nextMeeting+'T12:00:00');
        return d >= today0 && d <= in30;
      })
      .sort((a,b) => a.nextMeeting.localeCompare(b.nextMeeting))
      .slice(0, 8),
    [allConvs]
  );

  // Catch-up buckets — skip contacts with follow-up off or auto-dropped after 15 months (450d)
  const FORGO_DAYS = 450;
  const buckets = useMemo(() => {
    const b = { mo3:[], mo6:[], mo9:[], mo12:[] };
    people.forEach(p => {
      if (!p.followUpEnabled) return;
      const d = lastConvDate(p) ? daysSince(lastConvDate(p)) : Infinity;
      if      (d >= FORGO_DAYS) return; // auto-drop after 15 months
      else if (d >= 365) b.mo12.push(p);
      else if (d >= 270) b.mo9.push(p);
      else if (d >= 180) b.mo6.push(p);
      else if (d >= 90)  b.mo3.push(p);
    });
    return b;
  }, [people]);
  const catchupTotal = buckets.mo3.length + buckets.mo6.length + buckets.mo9.length + buckets.mo12.length;

  const recent = allConvs.slice(0, 5);

  if (people.length === 0) return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:40 }}>
      <div style={{ fontSize:52, marginBottom:16 }}>👥</div>
      <h2 style={{ fontSize:20, fontWeight:700, color:'#374151', marginBottom:8 }}>Start building your network memory</h2>
      <p style={{ fontSize:14, color:'#9ca3af', marginBottom:20 }}>Add your first contact to get started.</p>
      <Btn onClick={onAddPerson}>Add first contact</Btn>
    </div>
  );

  return (
    <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'16px 28px', background:'white', borderBottom:'1px solid #f3f4f6', display:'flex', alignItems:'baseline', gap:12 }}>
        <h1 style={{ fontSize:20, fontWeight:800, color:'#111827' }}>Your Network</h1>
        <span style={{ fontSize:13, color:'#9ca3af' }}>{greeting} — here's where things stand</span>
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'20px 28px' }}>
        {/* Stats row */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:18 }}>
          <StatCard icon="👥" label="New contacts (30d)" value={newContacts30} trend={newContacts30 - newContactsPrev30} />
          <StatCard icon="💬" label="Conversations this month" value={convs30}
            trend={convs30 - convsPrev30} />
          <StatCard icon="🔔" label="Overdue follow-ups" value={overdueCount}
            accent={overdueCount > 0 ? '#ef4444' : undefined} />
          <StatCard icon="📅" label="Upcoming meetings" value={upcoming.length}
            accent={upcoming.length > 0 ? '#4f46e5' : undefined} />
        </div>

        {/* Calendar */}
        <CalendarSection people={people} onSelectPerson={onSelectPerson} />

        {/* Birthday reminders */}
        <BirthdaySection people={people} onSelect={onSelectPerson} />

        {/* Two-column: catch up + upcoming */}
        <div style={{ display:'grid', gridTemplateColumns:'1.5fr 1fr', gap:14, marginBottom:14 }}>
          <CatchUpSection buckets={buckets} catchupTotal={catchupTotal} onSelect={onSelectPerson} onForgo={onForgo} />
          <UpcomingSection upcoming={upcoming} onSelect={onSelectPerson} />
        </div>

        {/* Recent conversations */}
        <RecentSection recent={recent} onSelect={onSelectPerson} />
      </div>
    </div>
  );
};

/* ── App ──────────────────────────────────────────────────────────────────── */
/* ── Loading / Error screens ──────────────────────────────────────────────── */
const LoadingScreen = () => (
  <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh', gap:16, background:'#f9fafb' }}>
    <div style={{ fontSize:36, animation:'spin 1.2s linear infinite', display:'inline-block' }}>⏳</div>
    <p style={{ fontSize:15, fontWeight:700, color:'#374151' }}>Loading your network…</p>
    <p style={{ fontSize:12, color:'#9ca3af' }}>Connecting to cloud storage</p>
    <style>{`@keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }`}</style>
  </div>
);

const ErrorScreen = ({ error, onRetry }) => (
  <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh', gap:12, background:'#f9fafb', padding:32 }}>
    <div style={{ fontSize:40 }}>⚠️</div>
    <p style={{ fontSize:16, fontWeight:700, color:'#374151' }}>Couldn't connect to cloud storage</p>
    <p style={{ fontSize:13, color:'#6b7280', maxWidth:360, textAlign:'center', lineHeight:'1.55' }}>{error}</p>
    <button onClick={onRetry} style={{ marginTop:8, padding:'9px 20px', background:'#6366f1', color:'white', border:'none', borderRadius:8, fontSize:14, fontWeight:600, cursor:'pointer' }}>Retry</button>
  </div>
);

/* ── App ──────────────────────────────────────────────────────────────────── */
const App = () => {
  const [people, setPeople] = useState([]);
  const [cloudReady, setCloudReady] = useState(false); // true once initial load done
  const [loadError, setLoadError] = useState(null);
  const [selectedId, setSelectedId] = useState(null);
  const [showPersonModal, setShowPersonModal] = useState(false);
  const [editingPerson, setEditingPerson] = useState(null);
  const [showConvModal, setShowConvModal] = useState(false);
  const [editingConv, setEditingConv] = useState(null);
  const [showQuickCapture, setShowQuickCapture] = useState(false);
  const [search, setSearch] = useState('');
  const [sortBy, setSortBy] = useState('recent');
  const saveTimer  = useRef(null);
  const skipSave   = useRef(false); // true while applying a remote realtime update
  const peopleRef  = useRef(people); // always current for beforeunload
  const [saveStatus, setSaveStatus] = useState('saved'); // 'saved' | 'pending' | 'saving'

  // Keep peopleRef in sync
  useEffect(() => { peopleRef.current = people; }, [people]);

  // Initial load from Supabase
  const doLoad = () => {
    setLoadError(null);
    setCloudReady(false);
    loadFromCloud()
      .then(cloudData => {
        skipSave.current = true;

        let people;
        if (cloudData && cloudData.length > 0) {
          // Supabase has data — use it and keep localStorage in sync
          people = cloudData;
          lsSave(cloudData);
        } else {
          // Supabase returned nothing — fall back to localStorage backup
          const local = lsLoad();
          if (local) {
            people = local;
            // Re-write local data back to Supabase so cloud catches up
            // (run after skipSave window so the debounce effect fires)
            setTimeout(() => { persistToCloud(local); }, 900);
          } else {
            people = SAMPLE; // truly empty first run
          }
        }

        setPeople(people);
        setCloudReady(true);
        setTimeout(() => { skipSave.current = false; }, 800);
      })
      .catch(e  => { setLoadError(e.message || 'Unknown error'); });
  };
  useEffect(() => { doLoad(); }, []);

  // Realtime subscription — push updates from other devices into local state
  useEffect(() => {
    if (!cloudReady) return;
    const channel = db
      .channel('resume-sync')
      .on('postgres_changes', {
        event: 'UPDATE', schema: 'public', table: TABLE,
        filter: `id=eq.${ROW_ID}`,
      }, (payload) => {
        if (payload.new?.data) {
          skipSave.current = true;            // don't echo the change back
          setPeople(payload.new.data);
          setSaveStatus('saved');
          setTimeout(() => { skipSave.current = false; }, 300);
        }
      })
      .subscribe();
    return () => { db.removeChannel(channel); };
  }, [cloudReady]);

  // Debounced cloud save — skipped when state came from a remote realtime event
  useEffect(() => {
    if (!cloudReady || skipSave.current) return;
    setSaveStatus('pending');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      setSaveStatus('saving');
      await persistToCloud(peopleRef.current);
      setSaveStatus('saved');
    }, 500);
    return () => clearTimeout(saveTimer.current);
  }, [people, cloudReady]);

  // Flush save immediately when tab closes — fetch+keepalive survives page unload
  useEffect(() => {
    const handleUnload = () => {
      if (!cloudReady || skipSave.current) return;
      clearTimeout(saveTimer.current);
      lsSave(peopleRef.current); // synchronous localStorage write always succeeds
      fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${ROW_ID}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({ data: peopleRef.current }),
        keepalive: true,
      });
    };
    window.addEventListener('beforeunload', handleUnload);
    return () => window.removeEventListener('beforeunload', handleUnload);
  }, [cloudReady]);

  const selected = people.find(p => p.id === selectedId) || null;

  const savePerson = (p) => {
    setPeople(prev => prev.find(x=>x.id===p.id) ? prev.map(x=>x.id===p.id?p:x) : [...prev, p]);
    setSelectedId(p.id);
    setShowPersonModal(false); setEditingPerson(null);
  };

  const forgoPerson = (id) => {
    setPeople(prev => prev.map(p => p.id === id ? { ...p, followUpEnabled: false } : p));
  };

  const deletePerson = (id) => {
    if (!confirm('Delete this contact and all their conversations?')) return;
    setPeople(prev => prev.filter(p=>p.id!==id));
    setSelectedId(null);
  };

  const saveConv = (conv) => {
    setPeople(prev => prev.map(p => {
      if (p.id !== selectedId) return p;
      const exists = p.conversations.find(c=>c.id===conv.id);
      const convs = exists ? p.conversations.map(c=>c.id===conv.id?conv:c) : [...p.conversations, conv];
      return { ...p, conversations: convs };
    }));
    setShowConvModal(false); setEditingConv(null);
  };

  // Save a conversation to any person by ID (used by Quick Capture)
  const saveConvToPersonId = (personId, conv) => {
    setPeople(prev => prev.map(p =>
      p.id === personId ? { ...p, conversations: [...(p.conversations||[]), conv] } : p
    ));
    setSelectedId(personId);
  };

  // Merge updated fields into an existing person (used by Quick Capture update intent)
  const updatePersonFields = (personId, fields) => {
    setPeople(prev => prev.map(p => {
      if (p.id !== personId) return p;
      return {
        ...p,
        role:     fields.role     || p.role,
        company:  fields.company  || p.company,
        hometown: fields.hometown || p.hometown,
        so:       fields.so       || p.so,
        kids:     fields.kids?.length ? [...new Set([...(p.kids||[]), ...fields.kids])] : (p.kids||[]),
        hobbies:  fields.hobbies?.length ? [...new Set([...(p.hobbies||[]), ...fields.hobbies])] : (p.hobbies||[]),
      };
    }));
    setSelectedId(personId);
  };

  const deleteConv = (personId, convId) => {
    if (!confirm('Delete this conversation entry?')) return;
    setPeople(prev => prev.map(p =>
      p.id === personId ? { ...p, conversations: p.conversations.filter(c=>c.id!==convId) } : p
    ));
  };

  if (loadError) return <ErrorScreen error={loadError} onRetry={doLoad} />;
  if (!cloudReady) return <LoadingScreen />;

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <Sidebar
        people={people} selectedId={selectedId}
        onSelect={setSelectedId}
        onAddPerson={() => { setEditingPerson(null); setShowPersonModal(true); }}
        onQuickCapture={() => setShowQuickCapture(true)}
        search={search} setSearch={setSearch}
        sortBy={sortBy} setSortBy={setSortBy}
        saveStatus={saveStatus}
      />

      {selected ? (
        <PersonDetail
          person={selected}
          onBack={() => setSelectedId(null)}
          onEditPerson={p => { setEditingPerson(p); setShowPersonModal(true); }}
          onDeletePerson={deletePerson}
          onAddConv={() => { setEditingConv(null); setShowConvModal(true); }}
          onEditConv={c => { setEditingConv(c); setShowConvModal(true); }}
          onDeleteConv={deleteConv}
        />
      ) : (
        <Dashboard
          people={people}
          onSelectPerson={setSelectedId}
          onAddPerson={() => { setEditingPerson(null); setShowPersonModal(true); }}
          onForgo={forgoPerson}
        />
      )}

      {showPersonModal && (
        <PersonModal person={editingPerson} onSave={savePerson} onClose={() => { setShowPersonModal(false); setEditingPerson(null); }} />
      )}
      {showConvModal && (
        <ConvModal conv={editingConv} personName={selected?.name} onSave={saveConv} onClose={() => { setShowConvModal(false); setEditingConv(null); }} />
      )}
      {showQuickCapture && (
        <QuickCapture
          people={people}
          onSaveConvToPersonId={saveConvToPersonId}
          onSavePerson={savePerson}
          onUpdatePersonFields={updatePersonFields}
          onClose={() => setShowQuickCapture(false)}
        />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
