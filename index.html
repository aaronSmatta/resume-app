const { useState, useEffect, useMemo, useRef } = React;

/* ── Utils ────────────────────────────────────────────────────────────────── */
const uid = () => Math.random().toString(36).slice(2, 10);

const fmt = (ds) => {
  if (!ds) return '';
  return new Date(ds + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};
const fmtBday = (ds) => {
  if (!ds) return '';
  // Support "MM-DD" (new) and legacy "YYYY-MM-DD"
  const p = ds.split('-');
  const mo = parseInt(p.length === 3 ? p[1] : p[0], 10) - 1;
  const dy = parseInt(p.length === 3 ? p[2] : p[1], 10);
  return new Date(2000, mo, dy).toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
};
const daysSince = (ds) => {
  if (!ds) return Infinity;
  return Math.floor((Date.now() - new Date(ds + 'T12:00:00')) / 86400000);
};
const initials = (name = '') => name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0,2) || '?';
const COLORS = ['var(--accent)','#E8590C','#0EA5A0','#EC4899','#F59E0B','#3B82F6','#8B5CF6','#14B8A6'];
/* ── Theme tokens (orange primary, Notion-inspired) — uppercase hex so the
      legacy-color recolor pass leaves them untouched ──────────────────────── */
const T = {
  accent:'var(--accent)', accentStrong:'var(--accent-strong)', accentDeep:'var(--accent-deep)',
  accentSoft:'var(--accent-soft)', accentSoft2:'var(--accent-soft-2)', accentBorder:'var(--accent-border)',
  teal:'#0EA5A0', tealSoft:'#E6F6F4',
  rose:'#EC4899', roseSoft:'#FCE7F3',
  blue:'#3B82F6', green:'#10B981', amber:'#F59E0B', red:'#EF4444',
  bg:'var(--bg)', surface:'var(--surface)',
  border:'var(--border)', borderStrong:'var(--border-strong)',
  text:'var(--text-strong)', textSoft:'var(--text-soft)', faint:'var(--faint)',
};
const avatarColor = (name='') => COLORS[name.charCodeAt(0) % COLORS.length] || COLORS[0];
const lastConvDate = (p) => p.conversations?.length
  ? [...p.conversations].sort((a,b) => b.date.localeCompare(a.date))[0].date
  : null;
const getStatus = (p) => {
  if (!p.followUpEnabled) return 'off';
  const last = lastConvDate(p);
  if (!last) return 'new';
  const d = daysSince(last), t = p.followUpDays || 60;
  if (d > t) return 'overdue';
  if (d > t * 0.75) return 'soon';
  return 'ok';
};
const STATUS_COLOR = { off:'var(--faintest)', new:'#60a5fa', ok:'#34d399', soon:'#fbbf24', overdue:'#f87171' };
const STATUS_LABEL = { off:'', new:'New contact', ok:'Up to date', soon:'Follow up soon', overdue:'Overdue — reach out!' };

const daysUntilBirthday = (birthdayStr) => {
  if (!birthdayStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const p = birthdayStr.split('-');
  const mo = parseInt(p.length === 3 ? p[1] : p[0], 10) - 1;
  const dy = parseInt(p.length === 3 ? p[2] : p[1], 10);
  let next = new Date(today.getFullYear(), mo, dy);
  if (next < today) next = new Date(today.getFullYear()+1, mo, dy);
  return Math.floor((next - today) / 86400000);
};

/* ── Kids: dynamic ages ───────────────────────────────────────────────────────
   A kid can be a legacy string ("Emma (8)") or an object { name, age, asOf }.
   `asOf` is the calendar year the age was recorded; the displayed age advances
   one year per calendar year so it stays roughly current without manual edits. */
const kidObj = (k) => {
  if (k && typeof k === 'object') return { name:k.name||'', age:(k.age??null), asOf:(k.asOf??null) };
  const s = String(k||'');
  const m = s.match(/^(.*?)\s*[\(\-]\s*(\d{1,2})\s*\)?\s*$/);
  if (m) return { name:m[1].trim(), age:parseInt(m[2],10), asOf:null };
  return { name:s.trim(), age:null, asOf:null };
};
const currentKidAge = (k) => {
  const o = kidObj(k);
  if (o.age == null) return null;
  if (!o.asOf) return o.age; // unknown anchor → show as recorded (static)
  const yrs = new Date().getFullYear() - parseInt(o.asOf, 10);
  return o.age + (yrs > 0 ? yrs : 0);
};
const kidDisplay = (k) => {
  const o = kidObj(k);
  const age = currentKidAge(k);
  if (age == null) return o.name;
  return `${o.name} · ~${age}`;
};

// Friendly "in N days" label for an upcoming YYYY-MM-DD date
const daysUntilLabel = (ds) => {
  if (!ds) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(ds+'T12:00:00'); d.setHours(0,0,0,0);
  const n = Math.round((d - today) / 86400000);
  if (n < 0) return fmt(ds);
  if (n === 0) return 'Today';
  if (n === 1) return 'Tomorrow';
  if (n < 7) return `In ${n} days`;
  if (n < 14) return 'Next week';
  if (n < 31) return `In ${Math.round(n/7)} weeks`;
  return fmt(ds);
};

/* ── Resume Brief Generator ───────────────────────────────────────────────── */
const buildResumeBrief = (person) => {
  const sorted = [...(person.conversations||[])].sort((a,b)=>b.date.localeCompare(a.date));
  if (!sorted.length) return null;

  const latest = sorted[0];
  const daysAgo = daysSince(latest.date);
  const firstName = person.name.split(' ')[0];

  // Human-readable time since last chat
  let timeStr;
  if (daysAgo === 0) timeStr = 'today';
  else if (daysAgo === 1) timeStr = 'yesterday';
  else if (daysAgo < 7) timeStr = `${daysAgo} days ago`;
  else if (daysAgo < 14) timeStr = 'last week';
  else if (daysAgo < 30) timeStr = `${Math.round(daysAgo/7)} weeks ago`;
  else if (daysAgo < 50) timeStr = 'about a month ago';
  else if (daysAgo < 75) timeStr = 'about 6 weeks ago';
  else if (daysAgo < 365) timeStr = `${Math.round(daysAgo/30)} months ago`;
  else timeStr = 'over a year ago';

  // Build synopsis: where + when + what was on their mind
  const lines = [];
  const where = latest.location ? ` at ${latest.location}` : '';
  lines.push(`You last connected ${timeStr}${where}.`);

  if (latest.insights) {
    // Take the first sentence/clause that's substantive
    const sentences = latest.insights.split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(s=>s.length>15);
    if (sentences[0]) {
      const snippet = sentences[0].length > 120 ? sentences[0].slice(0,117)+'…' : sentences[0];
      lines.push(snippet.endsWith('.') || snippet.endsWith('…') ? snippet : snippet + '.');
    }
  }

  // Count open items across the last 2 conversations
  const recentConvs = sorted.slice(0, 2);
  const openQs = recentConvs.flatMap(c=>c.openQuestions||[]);
  const followUps = recentConvs.flatMap(c=>c.followUps||[]);
  const totalOpen = openQs.length + followUps.length;
  if (totalOpen > 0) {
    lines.push(`There ${totalOpen===1?'is':'are'} ${totalOpen} open ${totalOpen===1?'item':'items'} to pick back up on.`);
  }

  // Pick-up items: questions first, then follow-ups, max 4 total
  const pickUpOn = [];
  openQs.slice(0,3).forEach(q => pickUpOn.push({ type:'question', text:q }));
  followUps.slice(0, Math.max(1, 4-pickUpOn.length)).forEach(f => pickUpOn.push({ type:'followup', text:f }));

  // Conversation starters (contextual suggestions)
  const starters = [];

  // Birthday alert
  if (person.birthday) {
    const bp = person.birthday.split('-');
    const bMo = parseInt(bp.length === 3 ? bp[1] : bp[0], 10) - 1;
    const bDy = parseInt(bp.length === 3 ? bp[2] : bp[1], 10);
    const now = new Date();
    let next = new Date(now.getFullYear(), bMo, bDy);
    if (next < now) next.setFullYear(now.getFullYear()+1);
    const daysUntil = Math.floor((next-now)/86400000);
    if (daysUntil <= 21) starters.push(`🎂 Birthday ${daysUntil===0?'is today':daysUntil<=7?'this week':`in ${daysUntil} days`} — wish them a happy one!`);
  }

  // SO mention
  if (person.so) {
    const recentMention = latest.insights?.toLowerCase().includes(person.so.toLowerCase());
    starters.push(recentMention ? `Ask how ${person.so} is doing — they came up last time.` : `Check in on ${person.so}.`);
  }

  // Hobbies as natural starters
  if (person.hobbies?.length) {
    starters.push(`Catch up on their ${person.hobbies[0]}.`);
    if (person.hobbies[1] && starters.length < 3) starters.push(`Their interest in ${person.hobbies[1]} could be a good thread.`);
  }

  // Long-gap suggestion
  if (daysAgo > 150 && starters.length < 3) starters.push("A lot may have changed — do a broad life update first.");

  // Suggest a topic you've talked about before but not recently
  const allTopics = sorted.flatMap(c=>c.topics||[]);
  const recentTopicSet = new Set(latest.topics||[]);
  const olderTopics = [...new Set(allTopics.filter(t=>!recentTopicSet.has(t)))];
  if (olderTopics.length && starters.length < 3) starters.push(`Revisit "${olderTopics[0]}" — a topic from a previous conversation.`);

  return {
    synopsis: lines.join(' '),
    pickUpOn: pickUpOn.slice(0,4),
    starters: starters.slice(0,3),
    lastDate: latest.date,
    daysAgo,
  };
};

/* Per-account rows: each signed-in user owns one data row (id = their user id)
   and one settings row (id = "<user id>::config"). 'main'/'config' are the old
   shared rows, kept only as a one-time migration source. */

const dataRowId   = (uid) => uid;
const configRowId = (uid) => uid + '::config';

const lsKey = (uid) => 'resume_backup::' + (uid || 'anon');
const lsSave = (uid, people) => {
  try { localStorage.setItem(lsKey(uid), JSON.stringify(people)); } catch(e) {}
};
const lsLoad = (uid) => {
  try {
    // Prefer this account's cache; fall back to the legacy single-device backup.
    const raw = localStorage.getItem(lsKey(uid)) || localStorage.getItem('resume_local_backup');
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) && parsed.length > 0 ? parsed : null;
  } catch(e) { return null; }
};

const loadFromCloud = async (uid) => {
  const { data, error } = await db.from(TABLE).select('data').eq('id', dataRowId(uid)).maybeSingle();
  if (error) throw error;
  return data ? data.data : null;
};

// One-time migration source: the old shared 'main' row (readable transitionally
// per AUTH_SETUP.md). Returns null if unavailable.
const loadLegacyCloud = async () => {
  try {
    const { data } = await db.from(TABLE).select('data').eq('id', LEGACY_DATA_ID).maybeSingle();
    return data && Array.isArray(data.data) && data.data.length ? data.data : null;
  } catch(e) { return null; }
};

const persistToCloud = async (uid, people) => {
  lsSave(uid, people); // always mirror to localStorage immediately
  const { error } = await db.from(TABLE).upsert({ id: dataRowId(uid), data: people });
  if (error) console.warn('Save error:', error.message);
};

  const { data, error } = await db.from(TABLE).select('data').eq('id', configRowId(uid)).maybeSingle();

  const { error } = await db.from(TABLE).upsert({ id: configRowId(uid), data: config });

};

/* ── Responsive hook ──────────────────────────────────────────────────────── */
const useIsMobile = (bp = 820) => {
  const [m, setM] = useState(() => typeof window !== 'undefined' && window.innerWidth <= bp);
  useEffect(() => {
    const on = () => setM(window.innerWidth <= bp);
    window.addEventListener('resize', on);
    return () => window.removeEventListener('resize', on);
  }, [bp]);
  return m;
};

/* ── Theme (light / dark) ─────────────────────────────────────────────────── */
const getInitialTheme = () => {
  try {
    const saved = localStorage.getItem('resume_theme');
    if (saved === 'light' || saved === 'dark') return saved;
  } catch(e) {}
  return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
};
const applyTheme = (t) => { try { document.documentElement.dataset.theme = t; } catch(e) {} };
applyTheme(getInitialTheme()); // apply ASAP so the loading/auth screens are themed too

const Svg = ({ d, size=16, color='currentColor', style }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
    {d.includes('M') && d.split('M').filter(Boolean).map((seg,i) => <path key={i} d={'M'+seg} />)}
  </svg>
);
// Better: just render as single path
const Icon = ({ name, size=16, color='currentColor', style }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
    <path d={IC[name]} />
  </svg>
);

  <div style={{ fontSize:11, fontWeight:700, color:'var(--faint)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:6 }}>{children}</div>

const Input = ({ style, ...props }) => (
  <input style={{ width:'100%', padding:'9px 12px', border:'1px solid var(--border-strong)', borderRadius:8, fontSize:14, color:'var(--text-strong)', background:'var(--surface)', ...style }} {...props} />
);

const Textarea = ({ style, ...props }) => (
  <textarea style={{ width:'100%', padding:'9px 12px', border:'1px solid var(--border-strong)', borderRadius:8, fontSize:14, color:'var(--text-strong)', lineHeight:'1.55', ...style }} {...props} />

const Btn = ({ variant='primary', style, children, ...props }) => {
  const base = { padding:'9px 18px', borderRadius:8, fontSize:14, fontWeight:600, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:6, border:'none', transition:'opacity 0.1s' };
  const styles = {
    primary: { background:'var(--accent)', color:'white' },

/* ── TagInput ─────────────────────────────────────────────────────────────── */
const TagInput = ({ tags=[], onChange, placeholder='Add, press Enter...' }) => {
  const [val, setVal] = useState('');
  const add = () => { const t = val.trim(); if (t && !tags.includes(t)) onChange([...tags, t]); setVal(''); };
  return (
    <div style={{ display:'flex', flexWrap:'wrap', gap:6, alignItems:'center', padding:'7px 10px', border:'1px solid var(--border-strong)', borderRadius:8, background:'var(--surface)', minHeight:40 }}>
      {tags.map(t => (
        <span key={t} style={{ display:'inline-flex', alignItems:'center', gap:3, padding:'2px 8px', background:'var(--accent-soft)', color:'var(--accent-strong)', borderRadius:99, fontSize:13 }}>
          {t}
          <button onClick={() => onChange(tags.filter(x=>x!==t))} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--accent)', lineHeight:1, fontSize:16, padding:0, marginLeft:1 }}>×</button>
        </span>
      ))}
      <input value={val} onChange={e=>setVal(e.target.value)}
        onKeyDown={e=>{ if(e.key==='Enter'||e.key===','){e.preventDefault();add();} }}
        onBlur={add}
        placeholder={tags.length ? '' : placeholder}
        style={{ border:'none', outline:'none', flex:1, minWidth:80, fontSize:14, background:'transparent', color:'var(--text)' }} />
    </div>
  );
};

/* ── KidsInput — name + age, stored with an anchor year so ages stay current ── */
const KidsInput = ({ kids=[], onChange }) => {
  const [name, setName] = useState('');
  const [age, setAge] = useState('');
  const add = () => {
    const n = name.trim(); if (!n) return;
    const hasAge = age.trim() !== '';
    const kid = hasAge
      ? { name:n, age: Math.max(0, parseInt(age,10)||0), asOf: String(new Date().getFullYear()) }
      : { name:n, age:null, asOf:null };
    onChange([...kids, kid]); setName(''); setAge('');
  };
  const remove = (i) => onChange(kids.filter((_,j)=>j!==i));
  const inp = { padding:'9px 12px', border:'1px solid var(--border-strong)', borderRadius:8, fontSize:14, color:'var(--text-strong)', background:'var(--surface)', outline:'none' };
  return (
    <div>
      {kids.length > 0 && (
        <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:8 }}>
          {kids.map((k,i) => (
            <span key={i} style={{ display:'inline-flex', alignItems:'center', gap:5, padding:'3px 8px 3px 10px', background:'#fef3c7', color:'#92400e', borderRadius:99, fontSize:13 }}>
              🧒 {kidDisplay(k)}
              <button onClick={()=>remove(i)} style={{ background:'none', border:'none', cursor:'pointer', color:'#b45309', lineHeight:1, fontSize:15, padding:0 }}>×</button>
            </span>
          ))}
        </div>
      )}
      <div style={{ display:'flex', gap:8 }}>
        <input value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); add(); } }}
          placeholder="Kid's name" style={{ ...inp, flex:1, minWidth:0 }}
          onFocus={e=>e.currentTarget.style.borderColor='var(--accent-border)'} onBlur={e=>e.currentTarget.style.borderColor='var(--border-strong)'} />
        <input value={age} onChange={e=>setAge(e.target.value.replace(/[^\d]/g,''))} type="text" inputMode="numeric"
          onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); add(); } }}
          placeholder="Age" style={{ ...inp, width:72, textAlign:'center' }}
          onFocus={e=>e.currentTarget.style.borderColor='var(--accent-border)'} onBlur={e=>e.currentTarget.style.borderColor='var(--border-strong)'} />
        <button onClick={add} style={{ padding:'0 16px', borderRadius:8, border:'none', background:T.accentSoft, color:T.accentDeep, fontWeight:600, fontSize:13, cursor:'pointer', whiteSpace:'nowrap' }}>Add</button>
      </div>
      <p style={{ fontSize:11, color:T.faint, marginTop:6 }}>Age auto-advances each year so it stays roughly current.</p>
    </div>
  );
};

/* ── BulletListInput ──────────────────────────────────────────────────────── */
const autoGrow = (el) => { if (el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; } };
const BulletList = ({ items=[], onChange, placeholder='Add item, press Enter...' }) => {
  const [val, setVal] = useState('');
  const add = () => { const t = val.trim(); if (t) { onChange([...items, t]); setVal(''); } };
  const editAt = (i, text) => onChange(items.map((it,j)=>j===i?text:it));
  return (
    <div style={{ border:'1px solid var(--border-strong)', borderRadius:8, overflow:'hidden' }}>
      {items.map((item, i) => (
        <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:8, padding:'8px 12px', background:'var(--surface)', borderBottom:'1px solid var(--border)' }}>
          <span style={{ color:'var(--faint)', marginTop:8, flexShrink:0, fontSize:12 }}>•</span>
          <textarea
            value={item} rows={1}
            ref={autoGrow}
            onChange={e=>{ autoGrow(e.target); editAt(i, e.target.value); }}
            onBlur={e=>{ if(!e.target.value.trim()) onChange(items.filter((_,j)=>j!==i)); }}
            onKeyDown={e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); e.target.blur(); } }}
            style={{ flex:1, border:'none', outline:'none', background:'transparent', fontSize:14, color:'var(--text)', lineHeight:'1.45', resize:'none', fontFamily:'inherit', padding:'2px 0', overflow:'hidden', minWidth:0 }} />
          <button onClick={() => onChange(items.filter((_,j)=>j!==i))} title="Remove"
            style={{ background:'none', border:'none', cursor:'pointer', color:'var(--faintest)', padding:0, flexShrink:0, marginTop:6 }}
            onMouseEnter={e=>e.currentTarget.style.color='#ef4444'}
            onMouseLeave={e=>e.currentTarget.style.color='var(--faintest)'}>
            <Icon name="x" size={13} color="currentColor" />
          </button>
        </div>
      ))}
      <div style={{ display:'flex', alignItems:'center', gap:6, padding:'7px 12px', background:'var(--bg)' }}>
        <span style={{ color:'var(--faintest)', fontSize:16, flexShrink:0 }}>+</span>
        <input value={val} onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter'){e.preventDefault();add();} }}
          onBlur={add}
          placeholder={placeholder}
          style={{ flex:1, border:'none', outline:'none', background:'transparent', fontSize:14, color:'var(--text-soft)' }} />
      </div>
    </div>
  );
};

/* ── Contact multi-select (used by group logs + events) ───────────────────── */
const ContactMultiSelect = ({ people, selectedIds, onChange, lockedId, placeholder='Add people who were there…' }) => {
  const [q, setQ] = useState('');
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);
  useEffect(() => {
    const close = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, []);
  const selected = selectedIds.map(id => people.find(p=>p.id===id)).filter(Boolean);
  const matches = people
    .filter(p => !selectedIds.includes(p.id))
    .filter(p => p.name.toLowerCase().includes(q.toLowerCase()))
    .slice(0, 6);
  const add = (id) => { onChange([...selectedIds, id]); setQ(''); };
  const remove = (id) => { if (id === lockedId) return; onChange(selectedIds.filter(x=>x!==id)); };
  return (
    <div ref={wrapRef} style={{ position:'relative' }}>
      <div onClick={()=>setOpen(true)}
        style={{ display:'flex', flexWrap:'wrap', gap:6, alignItems:'center', padding:'7px 10px', border:`1px solid ${T.borderStrong}`, borderRadius:8, background:T.surface, minHeight:40, cursor:'text' }}>
        {selected.map(p => (
          <span key={p.id} style={{ display:'inline-flex', alignItems:'center', gap:5, padding:'3px 6px 3px 4px', background:T.accentSoft, color:T.accentDeep, borderRadius:99, fontSize:13, fontWeight:500 }}>
            <Avatar name={p.name} size={18} />{p.name}
            {p.id !== lockedId && (
              <button onClick={(e)=>{ e.stopPropagation(); remove(p.id); }} style={{ background:'none', border:'none', cursor:'pointer', color:T.accent, lineHeight:1, fontSize:15, padding:0 }}>×</button>
            )}
          </span>
        ))}
        <input value={q} onFocus={()=>setOpen(true)} onChange={e=>{ setQ(e.target.value); setOpen(true); }}
          placeholder={selected.length ? '' : placeholder}
          style={{ border:'none', outline:'none', flex:1, minWidth:120, fontSize:14, background:'transparent', color:T.text }} />
      </div>
      {open && matches.length > 0 && (
        <div style={{ position:'absolute', top:'calc(100% + 4px)', left:0, right:0, zIndex:50, background:T.surface, border:`1px solid ${T.borderStrong}`, borderRadius:10, boxShadow:'0 8px 28px rgba(0,0,0,0.12)', padding:'4px 0', maxHeight:220, overflowY:'auto' }}>
          {matches.map(p => (
            <button key={p.id} onClick={()=>add(p.id)}
              style={{ display:'flex', alignItems:'center', gap:9, width:'100%', padding:'8px 12px', background:'none', border:'none', cursor:'pointer', textAlign:'left' }}
              onMouseEnter={e=>e.currentTarget.style.background=T.bg}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <Avatar name={p.name} size={26} />
              <div style={{ minWidth:0 }}>
                <p style={{ fontSize:13, fontWeight:600, color:T.text, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{p.name}</p>
                {(p.role||p.company) && <p style={{ fontSize:11, color:T.faint }}>{[p.role,p.company].filter(Boolean).join(' · ')}</p>}
              </div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
};

/* ── PartnerPicker — link a contact as spouse/partner (single select) ──────── */
const PartnerPicker = ({ people, selfId, partnerId, onChange }) => {
  const [q, setQ] = useState('');
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, []);
  const partner = people.find(p => p.id === partnerId);
  const matches = people
    .filter(p => p.id !== selfId && p.id !== partnerId)
    .filter(p => p.name.toLowerCase().includes(q.toLowerCase()))
    .slice(0, 6);
  if (partner) {
    return (
      <div style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 10px', border:`1px solid ${T.accentBorder}`, borderRadius:8, background:T.accentSoft }}>
        <Avatar name={partner.name} size={24} />
        <div style={{ flex:1, minWidth:0 }}>
          <p style={{ fontSize:13, fontWeight:600, color:T.text }}>{partner.name}</p>
          <p style={{ fontSize:11, color:T.accentDeep }}>Linked · changes sync both ways</p>
        </div>
        <button onClick={()=>onChange(null)} style={{ background:'none', border:'none', cursor:'pointer', color:T.accentDeep, fontSize:12, fontWeight:600 }}>Unlink</button>
      </div>
    );
  }
  return (
    <div ref={ref} style={{ position:'relative' }}>
      <input value={q} onFocus={()=>setOpen(true)} onChange={e=>{ setQ(e.target.value); setOpen(true); }}
        placeholder="Search contacts to link as partner…"
        style={{ width:'100%', padding:'9px 12px', border:`1px solid ${T.borderStrong}`, borderRadius:8, fontSize:14, color:T.text, background:'var(--surface)', outline:'none' }} />
      {open && matches.length > 0 && (
        <div style={{ position:'absolute', top:'calc(100% + 4px)', left:0, right:0, zIndex:50, background:T.surface, border:`1px solid ${T.borderStrong}`, borderRadius:10, boxShadow:'0 8px 28px rgba(0,0,0,0.12)', padding:'4px 0', maxHeight:200, overflowY:'auto' }}>
          {matches.map(p => (
            <button key={p.id} onClick={()=>{ onChange(p.id); setOpen(false); setQ(''); }}
              style={{ display:'flex', alignItems:'center', gap:9, width:'100%', padding:'8px 12px', background:'none', border:'none', cursor:'pointer', textAlign:'left' }}
              onMouseEnter={e=>e.currentTarget.style.background=T.bg}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <Avatar name={p.name} size={26} />
              <div style={{ minWidth:0 }}>
                <p style={{ fontSize:13, fontWeight:600, color:T.text, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{p.name}</p>
                {(p.role||p.company) && <p style={{ fontSize:11, color:T.faint }}>{[p.role,p.company].filter(Boolean).join(' · ')}</p>}
              </div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
};

/* ── Person Modal ─────────────────────────────────────────────────────────── */
const PersonModal = ({ person, people=[], onSave, onClose }) => {
  const blank = { id:uid(), name:'', role:'', company:'', howMet:'', hometown:'', so:'', kids:[], birthday:'', hobbies:[], groups:[], additionalInfo:'', followUpEnabled:true, followUpDays:60, createdAt:new Date().toISOString().slice(0,10), conversations:[], events:[], partnerId:null };
  const [f, setF] = useState(() => {
    const base = { ...blank, ...(person||{}) };
    // Migrate legacy "YYYY-MM-DD" birthday → "MM-DD"
    if (base.birthday && base.birthday.length > 5) base.birthday = base.birthday.slice(5);
    // Normalize kids → objects; anchor any existing age to this year so it starts
    // advancing dynamically from now on.
    const yr = String(new Date().getFullYear());
    base.kids = (base.kids||[]).map(k => {
      const o = kidObj(k);
      if (o.age != null && !o.asOf) o.asOf = yr;
      return o;
    });
    return base;
  });
  const set = (k,v) => setF(prev=>({...prev,[k]:v}));
  // Birthday month/day tracked independently so selecting one doesn't clear the other
  const _bdInit = (f.birthday || '').split('-');
  const [bdMonth, setBdMonth] = useState(_bdInit[0] || '');
  const [bdDay,   setBdDay  ] = useState(_bdInit[1] || '');
  const isEdit = !!person?.id;
  const valid = f.name.trim().length > 0;

  return (
    <div className="modal-bg" style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:200, padding:20 }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box" style={{ background:'var(--surface)', borderRadius:16, width:'100%', maxWidth:520, maxHeight:'90vh', overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'0 25px 60px rgba(0,0,0,0.2)' }}>
        <div style={{ padding:'20px 24px 16px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <h2 style={{ fontSize:18, fontWeight:700, color:'var(--text-strong)' }}>{isEdit ? 'Edit contact' : 'Add new contact'}</h2>
            <p style={{ marginTop:2, fontSize:13, color:'var(--faint)' }}>Fill in what you know — you can always add more later</p>
          </div>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--faint)', padding:4 }}><Icon name="x" size={20} color="currentColor" /></button>
        </div>

        <div style={{ padding:'20px 24px', overflowY:'auto', flex:1, display:'flex', flexDirection:'column', gap:16 }}>
          {/* 1. Name */}
          <div>
            <Label>Name *</Label>
            <Input value={f.name} onChange={e=>set('name',e.target.value)} placeholder="Full name" autoFocus />
          </div>

          {/* 2. Birthday */}
          <div>
            <Label>Birthday</Label>
            {(() => {
              const selStyle = { padding:'9px 12px', border:'1px solid var(--border-strong)', borderRadius:8, fontSize:14, color:'var(--text-strong)', background:'var(--surface)', cursor:'pointer' };
              const months = [['01','January'],['02','February'],['03','March'],['04','April'],['05','May'],['06','June'],['07','July'],['08','August'],['09','September'],['10','October'],['11','November'],['12','December']];
              return (
                <div style={{ display:'flex', gap:8 }}>
                  <select value={bdMonth} onChange={e => {
                    const mo = e.target.value;
                    setBdMonth(mo);
                    set('birthday', mo && bdDay ? `${mo}-${bdDay}` : '');
                  }} style={{ ...selStyle, flex:1 }}>
                    <option value="">Month</option>
                    {months.map(([v,l]) => <option key={v} value={v}>{l}</option>)}
                  </select>
                  <select value={bdDay} onChange={e => {
                    const dy = e.target.value;
                    setBdDay(dy);
                    set('birthday', bdMonth && dy ? `${bdMonth}-${dy}` : '');
                  }} style={{ ...selStyle, width:90 }}>
                    <option value="">Day</option>
                    {Array.from({length:31},(_,i)=>String(i+1).padStart(2,'0')).map(d=><option key={d} value={d}>{parseInt(d)}</option>)}
                  </select>
                </div>
              );
            })()}
          </div>

          {/* 3. Significant other */}
          <div>
            <Label>Significant other</Label>
            <Input value={f.so} onChange={e=>set('so',e.target.value)} placeholder="Name" />
            <div style={{ marginTop:8 }}>
              <p style={{ fontSize:11, color:T.faint, marginBottom:6 }}>Or link them as a contact (spouse / partner) — their profile stays connected to this one.</p>
              <PartnerPicker people={people} selfId={f.id} partnerId={f.partnerId||null} onChange={v=>set('partnerId',v)} />
            </div>
          </div>

          {/* 4. Kids */}
          <div>
            <Label>Kids — names &amp; ages</Label>
            <KidsInput kids={f.kids||[]} onChange={v=>set('kids',v)} />
          </div>

          {/* 5. How / where we met */}
          <div>
            <Label>Where / how we met</Label>
            <Input value={f.howMet} onChange={e=>set('howMet',e.target.value)} placeholder="e.g. SaaStr 2024, intro from Jake..." />
          </div>

          {/* 6. Hometown */}
          <div>
            <Label>Hometown / from</Label>
            <Input value={f.hometown} onChange={e=>set('hometown',e.target.value)} placeholder="e.g. Denver, CO" />

            <div><Label>Company</Label><Input value={f.company} onChange={e=>set('company',e.target.value)} placeholder="e.g. Stripe" /></div>
            <div><Label>Role</Label><Input value={f.role} onChange={e=>set('role',e.target.value)} placeholder="e.g. Product Manager" /></div>
          </div>

          {/* 9. Additional info */}
          <div>
            <Label>Additional info</Label>

      </div>

  );
};

/* ── Conversation Card ────────────────────────────────────────────────────── */
/* Inline-editable checklist used inside a conversation card (follow-ups / open
   questions). Items can be added, removed, and checked off — persisted by the
   parent via onChange / onToggleDone. */
/* Small Me / Them / Auto owner pill for a follow-up. owner is 'mine' | 'theirs'
   | undefined(auto). autoMine is what the heuristic would decide. */
const OwnerPill = ({ owner, autoMine, onCycle }) => {
  const isMine = owner ? owner === 'mine' : autoMine;
  const explicit = owner === 'mine' || owner === 'theirs';
  const label = isMine ? 'Me' : 'Them';
  const bg = isMine ? T.accentSoft : '#EEF1F4';
  const fg = isMine ? T.accentDeep : '#475569';
  return (
    <button onClick={onCycle}
      title={explicit ? `Marked as ${isMine?'your task':'their task'} — tap to change (Auto next)` : `Auto: counts as ${isMine?'your task':'their task'} — tap to set`}
      style={{ flexShrink:0, display:'inline-flex', alignItems:'center', gap:4, padding:'1px 8px', borderRadius:99, cursor:'pointer',
        fontSize:11, fontWeight:700, color:fg, background:bg,
        border: explicit ? `1px solid ${isMine?T.accentBorder:'#CBD5E1'}` : '1px dashed #CBD5E1', opacity: explicit ? 1 : 0.75 }}>
      <Icon name="user" size={10} color={fg} />{label}{!explicit && <span style={{ fontWeight:500, opacity:0.7 }}>·auto</span>}
    </button>
  );
};

const EditableConvList = ({ items=[], done=[], marker, color, onChange, onToggleDone, placeholder, addLabel='Add item', ownerOf, autoMineOf, onCycleOwner }) => {
  const [val, setVal] = useState('');
  const doneSet = new Set(done || []);
  const add = () => { const t = val.trim(); if (!t) return; onChange([...(items||[]), t]); setVal(''); };
  const remove = (i) => onChange((items||[]).filter((_,j)=>j!==i));
  return (
    <div>
      {(items||[]).map((it, i) => {
        const isDone = doneSet.has(it);
        return (
          <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:8, padding:'3px 0' }}>
            <button onClick={()=>onToggleDone(it)} title={isDone ? 'Mark not done' : 'Mark done'}
              style={{ flexShrink:0, marginTop:1, width:17, height:17, borderRadius:5, cursor:'pointer',
                border:`1.5px solid ${isDone ? color : '#cbd5e1'}`, background:isDone?color:'white',
                display:'flex', alignItems:'center', justifyContent:'center', padding:0 }}>
              {isDone && <Icon name="check" size={11} color="white" />}
            </button>
            <span style={{ flex:1, fontSize:14, lineHeight:1.45, color: isDone ? 'var(--faint)' : 'var(--text)', textDecoration: isDone ? 'line-through' : 'none' }}>{it}</span>
            {onCycleOwner && (
              <OwnerPill owner={ownerOf(it)} autoMine={autoMineOf(it)} onCycle={()=>onCycleOwner(it)} />
            )}
            <button onClick={()=>remove(i)} title="Remove"
              style={{ flexShrink:0, background:'none', border:'none', cursor:'pointer', color:'var(--faintest)', padding:'0 2px', marginTop:1 }}
              onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color='var(--faintest)'}>
              <Icon name="x" size={13} color="currentColor" />
            </button>
          </div>
        );
      })}
      <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:4 }}>
        <span style={{ color:'var(--faintest)', fontSize:15, flexShrink:0, width:17, textAlign:'center' }}>+</span>
        <input value={val} onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); add(); } }}
          placeholder={placeholder}
          style={{ flex:1, border:'none', borderBottom:'1px solid var(--border)', outline:'none', background:'transparent', fontSize:13, color:'var(--text-soft)', padding:'3px 0' }} />
        {val.trim() && <button onClick={add} style={{ fontSize:12, fontWeight:600, color:color, background:'none', border:'none', cursor:'pointer' }}>{addLabel}</button>}
      </div>
    </div>
  );
};

            </Section>
          )}
          <Section label="Open questions">
            <EditableConvList
              items={conv.openQuestions} done={conv.doneQuestions} marker="?" color="#f59e0b"
              placeholder="Add a question to ask next time…" addLabel="Add"

              onToggleDone={(t)=>onPatch(conv.id, { doneQuestions: toggleIn(conv.doneQuestions, t) })}
            />

            <EditableConvList

                const keep = new Set(arr);
                const owner = Object.fromEntries(Object.entries(conv.followUpOwner||{}).filter(([k])=>keep.has(k)));
                onPatch(conv.id, { followUps:arr, doneFollowUps:(conv.doneFollowUps||[]).filter(x=>keep.has(x)), followUpOwner:owner });

              onToggleDone={(t)=>onPatch(conv.id, { doneFollowUps: toggleIn(conv.doneFollowUps, t) })}
              ownerOf={(t)=> conv.followUpOwner?.[t]}

};

/* ── Person Detail ────────────────────────────────────────────────────────── */
const PersonDetail = ({ person, people=[], onBack, onOpenPartner, onEditPerson, onDeletePerson, onAddConv, onEditConv, onDeleteConv, onPatchConv, onSchedule, onEditEvent, onDeleteEvent }) => {
  const sorted = [...(person.conversations||[])].sort((a,b)=>b.date.localeCompare(a.date));
  const partner = person.partnerId ? people.find(p=>p.id===person.partnerId) : null;
  const status = getStatus(person);
  const todayStr = new Date().toISOString().slice(0,10);
  // Upcoming: standalone events + meetings scheduled from conversations
  const upcoming = useMemo(() => {
    const out = [];
    (person.events||[]).forEach(ev => { if (ev.date >= todayStr) out.push({ kind:'event', id:ev.id, date:ev.date, time:ev.time, title:ev.title||'Event', location:ev.location, participants:ev.participants, raw:ev }); });
    (person.conversations||[]).forEach(c => { if (c.nextMeeting && c.nextMeeting >= todayStr) out.push({ kind:'meeting', id:c.id, date:c.nextMeeting, title:c.nextMeetingNote||'Catch-up' }); });
    return out.sort((a,b)=>a.date.localeCompare(b.date));
  }, [person]);
  const allTopics = useMemo(() => {
    const counts = {};
    sorted.flatMap(c=>c.topics||[]).forEach(t=>{ counts[t]=(counts[t]||0)+1; });
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  }, [sorted]);

  return (
    <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
      {/* Top bar */}
      <div className="r-pad r-actions" style={{ padding:'14px 24px', background:'var(--surface)', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12 }}>
        <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--faint)', padding:4, display:'flex', alignItems:'center' }}
          onMouseEnter={e=>e.currentTarget.style.color='var(--text)'} onMouseLeave={e=>e.currentTarget.style.color='var(--faint)'}>
          <Icon name="back" size={20} color="currentColor" />
        </button>
        <Avatar name={person.name} size={44} />
        <div style={{ flex:1, minWidth:120 }}>
          <h1 style={{ fontSize:20, fontWeight:700, color:'var(--text-strong)', marginBottom:1 }}>{person.name}</h1>
          {(person.role||person.company) && (
            <p style={{ fontSize:13, color:'var(--text-soft)' }}>{[person.role, person.company].filter(Boolean).join(' · ')}</p>
          )}
        </div>
        <div style={{ display:'flex', gap:6, flexWrap:'wrap', justifyContent:'flex-end' }}>
          <Btn onClick={onAddConv} style={{ fontSize:13 }}>
            <Icon name="plus" size={14} color="white" />Log conversation
          </Btn>
          <Btn variant="secondary" onClick={onSchedule} style={{ fontSize:13 }}>
            <Icon name="calendar" size={14} color="var(--text-soft)" />Schedule

            </div>

          <Card title={`Themes across ${sorted.length} conversations`}>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>

        </div>

/* ── Deep Search ──────────────────────────────────────────────────────────── */
const FIELD_PRIORITY = { name:0, company:1, role:2, howMet:3, location:4, topic:5, insights:6, hobbies:7, notes:8, openQuestion:9, followUp:10, hometown:11, so:12 };

const deepSearch = (people, query) => {
  if (!query.trim()) return [];
  const q = query.toLowerCase().trim();
  const results = [];

  for (const person of people) {
    const raw = [];

    // Profile fields
    const tryProfile = (field, text, icon) => {
      if (text?.toLowerCase().includes(q)) raw.push({ field, text, icon });
    };
    tryProfile('name', person.name, '👤');
    tryProfile('company', person.company, '🏢');
    tryProfile('role', person.role, '💼');
    tryProfile('howMet', person.howMet, '🤝');
    tryProfile('hometown', person.hometown, '🏠');
    if (person.so?.toLowerCase().includes(q)) raw.push({ field:'so', text:`Partner: ${person.so}`, icon:'❤️' });
    if (person.hobbies?.some(h=>h.toLowerCase().includes(q))) {
      raw.push({ field:'hobbies', text: person.hobbies.filter(h=>h.toLowerCase().includes(q)).join(', '), icon:'🎯' });
    }

    // Conversation fields
    for (const conv of (person.conversations||[])) {
      const tryConv = (field, text, icon) => {
        if (!text?.toLowerCase().includes(q)) return;
        let snippet = text;
        if (text.length > 85) {
          const idx = text.toLowerCase().indexOf(q);
          const start = Math.max(0, idx - 20);
          const end = Math.min(text.length, idx + q.length + 45);
          snippet = (start>0?'…':'') + text.slice(start, end) + (end<text.length?'…':'');
        }
        raw.push({ field, text: snippet, icon, date: conv.date });
      };
      tryConv('location', conv.location, '📍');
      conv.topics?.forEach(t => { if(t.toLowerCase().includes(q)) raw.push({ field:'topic', text:t, icon:'💬', date:conv.date }); });
      tryConv('insights', conv.insights, '💡');
      tryConv('notes', conv.notes, '📝');
      conv.openQuestions?.forEach(oq => { if(oq.toLowerCase().includes(q)) raw.push({ field:'openQuestion', text:oq, icon:'❓', date:conv.date }); });
      conv.followUps?.forEach(fu => { if(fu.toLowerCase().includes(q)) raw.push({ field:'followUp', text:fu, icon:'→', date:conv.date }); });
    }

    if (!raw.length) continue;

    // Sort by priority, deduplicate by field, take top 2
    raw.sort((a,b)=>(FIELD_PRIORITY[a.field]??99)-(FIELD_PRIORITY[b.field]??99));
    const seen = new Set();
    const top = raw.filter(m=>{ if(seen.has(m.field)) return false; seen.add(m.field); return true; }).slice(0,2);
    results.push({ person, matches: top });
  }

  // Best-match-first: sort by top match field priority
  return results.sort((a,b)=>(FIELD_PRIORITY[a.matches[0]?.field]??99)-(FIELD_PRIORITY[b.matches[0]?.field]??99));
};

// Inline text highlighter — wraps the matched substring in a yellow mark
const Highlight = ({ text, query }) => {
  if (!text || !query) return <span>{text}</span>;
  const q = query.toLowerCase();
  const idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return <span>{text}</span>;
  return (
    <span>
      {text.slice(0, idx)}
      <mark style={{ background:'#fef08a', color:'inherit', borderRadius:2, padding:'0 1px' }}>{text.slice(idx, idx+query.length)}</mark>
      {text.slice(idx+query.length)}
    </span>
  );
};

/* ── Natural Language Parser ──────────────────────────────────────────────── */
const parseNaturalInput = (text, people) => {
  const lower = text.toLowerCase();

  // Match existing person (longer names first to avoid partial matches)
  let matchedPerson = null;
  const sortedPeople = [...people].sort((a, b) => b.name.length - a.name.length);
  for (const p of sortedPeople) {
    const parts = p.name.split(/\s+/);
    const checks = [p.name.toLowerCase(), ...parts.filter(n => n.length >= 3).map(n => n.toLowerCase())];
    if (checks.some(n => lower.includes(n))) { matchedPerson = p; break; }
  }

  // Extract new person name
  let newName = '';
  if (!matchedPerson) {
    const namePats = [
      /(?:just )?met\s+(?:with\s+)?([A-Z][a-z]+(?: [A-Z][a-z]+)+)/,
      /(?:talking|talked|chatting|chatted|caught up|lunch|coffee|dinner|call\s+with|spoke(?:n)?\s+with)\s+with\s+([A-Z][a-z]+(?: [A-Z][a-z]+)+)/,
      /^([A-Z][a-z]+(?: [A-Z][a-z]+)+)\s*[-–—:,]/,
      /(?:new\s+contact|add(?:ing)?(?:\s+a)?(?:\s+new)?\s+contact|creat(?:e|ing)(?:\s+a)?(?:\s+new)?\s+contact)\s+(?:for\s+)?([A-Z][a-z]+(?: [A-Z][a-z]+)+)/i,
      /\bfor\s+([A-Z][a-z]+(?: [A-Z][a-z]+)+)\b/,
    ];
    for (const rx of namePats) {
      const m = text.match(rx);
      if (m) { newName = m[1].trim(); break; }
    }
  }

  // Intent
  const hasUpdateKeyword = /^(update\b|add\s+that\b|remember\s+that\b|note\s+that\b|also\s+note\b|fyi\b)/i.test(text.trim());
  const hasConvKeyword = /\b(talked?|chatted?|caught\s+up|coffee|lunch|dinner|drinks?|zoom|phone\s+call|video\s+call|call|spoke|spoken|met\s+with|had\s+a\s+(?:meeting|chat|call))\b/i.test(text);
  const intent = hasUpdateKeyword && matchedPerson ? 'update'
    : matchedPerson ? 'conversation'
    : newName ? 'new_person'
    : 'unclear';

  // Date
  let date = new Date().toISOString().slice(0, 10);
  let dateLabel = 'today';
  if (/\byesterday\b/i.test(text)) {
    const d = new Date(); d.setDate(d.getDate() - 1);
    date = d.toISOString().slice(0, 10); dateLabel = 'yesterday';
  } else if (/\blast\s+week\b/i.test(text)) {
    const d = new Date(); d.setDate(d.getDate() - 7);
    date = d.toISOString().slice(0, 10); dateLabel = 'last week';
  } else if (/\b(?:a\s+)?(?:couple|few)\s+(?:days|weeks)\s+ago\b/i.test(text)) {
    const d = new Date(); d.setDate(d.getDate() - 4);
    date = d.toISOString().slice(0, 10); dateLabel = 'a few days ago';
  }

  // Location
  let location = '';
  if (/\bon\s+(?:a\s+)?zoom(?:\s+call)?\b/i.test(text)) location = 'Zoom';
  else if (/\bon\s+(?:a\s+)?(?:phone|video)\s+call\b/i.test(text)) location = 'Phone call';
  else if (/\bvirtually\b/i.test(text)) location = 'Virtual';
  else {
    const locPats = [
      /\bover\s+(?:coffee|lunch|dinner|drinks?)\s+at\s+([A-Z][A-Za-z'&\s]{2,28?})(?=[,.]|\s+(?:about|we|he|she|they|I|and|to))/i,
      /\b(?:coffee|lunch|dinner|drinks?)\s+at\s+([A-Z][A-Za-z'&\s]{2,28?})(?=[,.]|\s+(?:about|we|he|she|they|I|and|to))/i,
      /\bat\s+([A-Z][A-Za-z'&\s]{2,28?})(?=[,.]|\s+(?:about|we|he|she|they|I|and|to|for|over|on|with))/,
    ];
    for (const rx of locPats) {
      const m = text.match(rx);
      if (m && m[1]) { location = m[1].trim().replace(/\s+$/, ''); break; }
    }
  }

  // Topics
  let topics = [];
  const topicRx = /(?:talked?\s+about|chatted?\s+about|spoke\s+about|discussed?|went\s+(?:over|through)|covered|touched\s+on|about)\s+([^.!?\n]{4,100})/gi;
  for (const m of text.matchAll(topicRx)) {
    m[1].split(/,\s*|\s+and\s+/)
      .map(s => s.trim().replace(/[.,!?]$/, ''))
      .filter(s => s.length > 2 && s.length < 60 && !/^(he|she|they|we|his|her|their|the|a|an|it|this|that|which|who|how|what|when|where|why)\b/i.test(s))
      .slice(0, 3)
      .forEach(t => topics.push(t));
  }
  topics = [...new Set(topics)].slice(0, 6);

  // Company
  let company = '';
  const coM = text.match(/\b(?:works?\s+(?:at|for)|joining|joined|left|starting\s+(?:a\s+)?(?:new\s+)?(?:company|startup|firm)\s+(?:called|named)\s+)\s*([A-Z][A-Za-z]+(?:\s+[A-Z][A-Za-z]+)?)/);
  if (coM) company = coM[1];

  // Role
  let role = '';
  const roleM = text.match(/\b(?:she(?:'s|\s+is)?\s+(?:a|an|the)|he(?:'s|\s+is)?\s+(?:a|an|the)|is\s+(?:a|an|the)|works?\s+as\s+(?:a|an))\s+([A-Za-z]+(?:\s+[A-Za-z]+){0,3}?)(?=\s+at|\s+for|[,.]|\s*$)/i);
  if (roleM) role = roleM[1].trim();

  // Significant other
  let so = '';
  const soM = text.match(/\b(?:wife|husband|partner|SO|boyfriend|girlfriend|fianc[ée]|spouse)\s+(?:is\s+|named?\s+)?([A-Z][a-z]+)/i)
    || text.match(/\bmarried\s+to\s+([A-Z][a-z]+)/i)
    || text.match(/\b(?:her|his)\s+(?:husband|wife|partner|boyfriend|girlfriend)\s+(?:is\s+)?([A-Z][a-z]+)/i);
  if (soM) so = soM[1];

  // Kids
  let kids = [];
  const kidsNameRx = /\b(?:kids?|children|son|daughter|boys?|girls?)\s+(?:are?\s+named?|(?:is|are)\s+called|named?)\s+([A-Z][a-z]+(?:(?:\s*,\s*|\s+and\s+)[A-Z][a-z]+)*)/gi;
  for (const m of text.matchAll(kidsNameRx)) {
    m[1].split(/,\s*|\s+and\s+/).map(s=>s.trim()).filter(Boolean).forEach(k=>kids.push(k));
  }
  const kidsHasRx = /\bhas\s+(?:a\s+)?(?:son|daughter|two\s+kids?|three\s+kids?|[0-9]+\s+kids?)[^.]*?named?\s+([A-Z][a-z]+(?:(?:\s*,\s*|\s+and\s+)[A-Z][a-z]+)*)/gi;
  for (const m of text.matchAll(kidsHasRx)) {
    m[1].split(/,\s*|\s+and\s+/).map(s=>s.trim()).filter(Boolean).forEach(k=>kids.push(k));
  }
  kids = [...new Set(kids)].slice(0, 6);

  // Hometown
  let hometown = '';
  const htM = text.match(/\b(?:from|grew\s+up\s+in|originally\s+from|based\s+in|hometown\s+is)\s+([A-Z][A-Za-z\s,]{2,35?})(?=[.,\n]|$)/i);
  if (htM) hometown = htM[1].trim().replace(/[.,]$/, '').slice(0, 40);

  // Hobbies
  let hobbies = [];
  const hobbyRx = /\b(?:likes?\s+(?:to\s+)?|loves?\s+(?:to\s+)?|is\s+(?:big\s+)?into\s+|enjoys?\s+|passionate\s+about\s+|big\s+(?:fan\s+of|into)\s+|hobbies?\s+(?:include|is|are)\s+)([^.!?\n]{3,60})/gi;
  for (const m of text.matchAll(hobbyRx)) {
    m[1].split(/,\s*|\s+and\s+/).map(s => s.trim().replace(/[.,!?]$/, '')).filter(s => s.length > 1 && s.length < 35).forEach(h => hobbies.push(h));
  }
  hobbies = [...new Set(hobbies)].slice(0, 5);

  // Birthday — parse "birthday is March 15", "born on March 15", "bday June 3", etc. → "MM-DD"
  let birthday = '';
  const BMONTHS = { january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12,
    jan:1,feb:2,mar:3,apr:4,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12 };
  const bdRxList = [
    /\b(?:birthday|bday)\s+(?:is\s+|on\s+)?([A-Za-z]+)\s+(\d{1,2})(?:st|nd|rd|th)?\b/i,
    /\b(?:birthday|bday)\s+(?:is\s+|on\s+)?(\d{1,2})(?:st|nd|rd|th)?\s+(?:of\s+)?([A-Za-z]+)/i,
    /\bborn(?:\s+on)?\s+([A-Za-z]+)\s+(\d{1,2})(?:st|nd|rd|th)?\b/i,
    /\bborn(?:\s+on)?\s+(\d{1,2})(?:st|nd|rd|th)?\s+(?:of\s+)?([A-Za-z]+)/i,
  ];
  for (const rx of bdRxList) {
    const m = text.match(rx);
    if (m) {
      let mo, dy;
      if (isNaN(parseInt(m[1], 10))) { mo = BMONTHS[m[1].toLowerCase()]; dy = parseInt(m[2], 10); }
      else { dy = parseInt(m[1], 10); mo = BMONTHS[m[2].toLowerCase()]; }
      if (mo && dy && dy >= 1 && dy <= 31) {
        birthday = String(mo).padStart(2,'0') + '-' + String(dy).padStart(2,'0'); break;
      }
    }
  }

  // Open questions
  let openQuestions = [];
  const oqRx = /\b(?:not\s+sure|still\s+(?:waiting|wondering)|wondering|need\s+to\s+(?:find\s+out|ask|check|clarify)|want\s+to\s+(?:know|ask|clarify)|curious\s+(?:about|if|whether))\s+([^.!?\n]{5,100})/gi;
  for (const m of text.matchAll(oqRx)) openQuestions.push(m[1].trim().replace(/[.,]$/, ''));
  openQuestions = [...new Set(openQuestions)].slice(0, 3);

  // Follow-ups
  let followUps = [];
  const fuRx = /\b(?:need\s+to|want\s+to|going\s+to|should|plan\s+to|I'll|will|have\s+to)\s+(?:send|share|intro(?:duce)?|connect|follow\s+up|reach\s+out|check\s+in|look\s+into|get|put\s+together|forward|introduce)\b([^.!?\n]{0,70})/gi;
  for (const m of text.matchAll(fuRx)) {
    const action = m[0].trim().replace(/[.,]$/, '').replace(/\s+/g, ' ');
    if (action.length > 8) followUps.push(action);
  }
  followUps = [...new Set(followUps)].slice(0, 3);

  return { intent, matchedPerson, newName, date, dateLabel, location, topics, company, role, so, kids, birthday, hometown, hobbies, openQuestions, followUps, insights: text.trim() };
};

/* Comma-separated array editor that keeps the RAW typed text (including trailing
   spaces/commas) so the caret never jumps and spaces aren't swallowed. The parsed
   array is emitted on change; external resets (e.g. re-parse) re-sync the text. */
const ArrayInput = ({ value=[], onChange, placeholder }) => {
  const [text, setText] = useState(() => (value||[]).join(', '));
  const lastEmit = useRef((value||[]).join(', '));
  useEffect(() => {
    const joined = (value||[]).join(', ');
    if (joined !== lastEmit.current) { setText(joined); lastEmit.current = joined; }
  }, [value]);
  const handle = (e) => {
    const raw = e.target.value;
    setText(raw);
    const arr = raw.split(',').map(s=>s.trim()).filter(Boolean);
    lastEmit.current = arr.join(', ');
    onChange(arr);
  };
  return (
    <input type="text" value={text} onChange={handle} placeholder={placeholder}
      style={{ flex:1, padding:'5px 9px', border:'1px solid var(--faintest)', borderRadius:6, fontSize:12, outline:'none', fontFamily:'inherit', minWidth:0, background:'var(--surface)' }}
      onFocus={e=>e.currentTarget.style.borderColor='var(--accent-border)'}
      onBlur={e=>e.currentTarget.style.borderColor='var(--faintest)'} />
  );
};
const arrayInput = (arr, onChange, placeholder) => (
  <ArrayInput value={arr} onChange={onChange} placeholder={placeholder} />
);
