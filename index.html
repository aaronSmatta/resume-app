  const hadDataRef = useRef(false);  // true once we've loaded a non-empty set (guards against wiping)
  const [saveStatus, setSaveStatus] = useState('saved'); // 'saved' | 'pending' | 'saving'

  // Keep peopleRef in sync
  useEffect(() => { peopleRef.current = people; }, [people]);

  // Track the current access token (used by the tab-close keepalive flush under RLS)
  useEffect(() => {
    db.auth.getSession().then(({ data }) => { tokenRef.current = data.session?.access_token || null; });
    const { data: sub } = db.auth.onAuthStateChange((_e, s) => { tokenRef.current = s?.access_token || null; });
    return () => sub.subscription.unsubscribe();
  }, []);

  // Initial load from Supabase
  const doLoad = () => {
    setLoadError(null);
    setCloudReady(false);
    loadFromCloud(userId)
      .then(async (cloudData) => {
        skipSave.current = true;

        let people;
        if (cloudData && cloudData.length > 0) {
          // This account already has data in the cloud — use it.
          people = cloudData;
          lsSave(userId, cloudData);
          hadDataRef.current = true;
        } else {
          // Empty/new account row → migrate: legacy shared row first, then this
          // device's local backup. Whatever we find is written up to the account row.
          let seed = await loadLegacyCloud();
          if (!seed) seed = lsLoad(userId);
          if (seed && seed.length) {
            people = seed;
            hadDataRef.current = true;
            setTimeout(() => { persistToCloud(userId, seed); }, 900); // after the skipSave window
          } else {
            people = SAMPLE; // genuinely new, empty account
          }
        }

        setPeople(people);
        setCloudReady(true);
        setTimeout(() => { skipSave.current = false; }, 800);
      })
      .catch(e  => { setLoadError(e.message || 'Unknown error'); });
  };
  useEffect(() => { if (userId) doLoad(); }, [userId]);

  // Realtime subscription — push updates from this account's other devices
  useEffect(() => {
    if (!cloudReady || !userId) return;
    const channel = db
      .channel('resume-sync')
      .on('postgres_changes', {
        event: 'UPDATE', schema: 'public', table: TABLE,
        filter: `id=eq.${dataRowId(userId)}`,
      }, (payload) => {
        if (payload.new?.data) {
          skipSave.current = true;            // don't echo the change back
          setPeople(payload.new.data);
          if (payload.new.data.length) hadDataRef.current = true;
          setSaveStatus('saved');
          setTimeout(() => { skipSave.current = false; }, 300);
        }
      })
      .subscribe();
    return () => { db.removeChannel(channel); };
  }, [cloudReady, userId]);

  // Debounced cloud save — skipped when state came from a remote realtime event.
  // Safety: never write an empty set unless we've actually held data this session,
  // so an unreadable/empty load can't silently wipe the account's cloud data.
  useEffect(() => {
    if (!cloudReady || skipSave.current) return;
    if (peopleRef.current.length === 0 && !hadDataRef.current) return;
    if (peopleRef.current.length > 0) hadDataRef.current = true;
    setSaveStatus('pending');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      setSaveStatus('saving');
      await persistToCloud(userId, peopleRef.current);
      setSaveStatus('saved');
    }, 500);
    return () => clearTimeout(saveTimer.current);
  }, [people, cloudReady]);

  // Flush save immediately when tab closes — fetch+keepalive survives page unload
  useEffect(() => {
    const handleUnload = () => {
      if (!cloudReady || skipSave.current) return;
      if (peopleRef.current.length === 0 && !hadDataRef.current) return;
      clearTimeout(saveTimer.current);
      lsSave(userId, peopleRef.current); // synchronous localStorage write always succeeds
      fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${dataRowId(userId)}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${tokenRef.current || SUPABASE_KEY}`,
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({ data: peopleRef.current }),
        keepalive: true,
      });
    };
    window.addEventListener('beforeunload', handleUnload);
    return () => window.removeEventListener('beforeunload', handleUnload);
  }, [cloudReady]);

  const selected = people.find(p => p.id === selectedId) || null;

  const savePerson = (p) => {
    setPeople(prev => {
      let list = prev.find(x=>x.id===p.id) ? prev.map(x=>x.id===p.id?p:x) : [...prev, p];
      // Keep partner links reciprocal: clear an old link, set the new one.
      const oldPartnerId = prev.find(x=>x.id===p.id)?.partnerId || null;
      const newPartnerId = p.partnerId || null;
      if (oldPartnerId && oldPartnerId !== newPartnerId)
        list = list.map(x => x.id===oldPartnerId && x.partnerId===p.id ? { ...x, partnerId:null } : x);
      if (newPartnerId)
        list = list.map(x => x.id===newPartnerId ? { ...x, partnerId:p.id }
                           : (x.id!==p.id && x.partnerId===newPartnerId ? { ...x, partnerId:null } : x));
      return list;
    });
    setSelectedId(p.id);
    setShowPersonModal(false); setEditingPerson(null);
  };

  const forgoPerson = (id) => {
    setPeople(prev => prev.map(p => p.id === id ? { ...p, followUpEnabled: false } : p));
  };

  const deletePerson = (id) => {
    if (!confirm('Delete this contact and all their conversations?')) return;
    setPeople(prev => prev.filter(p=>p.id!==id).map(p => p.partnerId===id ? { ...p, partnerId:null } : p));
    setSelectedId(null);
  };

  // Mark/unmark a conversation follow-up ("commitment") as done
  const toggleFollowUpDone = (personId, convId, text) => {
    setPeople(prev => prev.map(p => {
      if (p.id !== personId) return p;
      return { ...p, conversations: (p.conversations||[]).map(c => {
        if (c.id !== convId) return c;
        const done = c.doneFollowUps || [];
        const next = done.includes(text) ? done.filter(t=>t!==text) : [...done, text];
        return { ...c, doneFollowUps: next };
      }) };
    }));
  };

  // Explicitly set who owns a follow-up ('mine' | 'theirs' | undefined to clear)
  const setFollowUpOwner = (personId, convId, text, owner) => {
    setPeople(prev => prev.map(p => {
      if (p.id !== personId) return p;
      return { ...p, conversations: (p.conversations||[]).map(c => {
        if (c.id !== convId) return c;
        const map = { ...(c.followUpOwner||{}) };
        if (owner) map[text] = owner; else delete map[text];
        return { ...c, followUpOwner: map };
      }) };
    }));
  };

  const saveConv = (conv, participantIds) => {
    if (editingConv) {
      // Editing → update in place for the currently selected person only
      setPeople(prev => prev.map(p => {
        if (p.id !== selectedId) return p;
        const convs = (p.conversations||[]).map(c=>c.id===conv.id?conv:c);
        return { ...p, conversations: convs };
      }));
    } else {
      // New log → distribute to every selected participant (group gathering when >1)
      const ids = participantIds && participantIds.length ? participantIds
                : (selectedId ? [selectedId] : []);
      setPeople(prev => {
        const isGroup = ids.length > 1;
        const groupId = isGroup ? uid() : null;
        const names = ids.map(id => prev.find(p=>p.id===id)?.name).filter(Boolean);
        return prev.map(p => ids.includes(p.id)
          ? { ...p, conversations: [...(p.conversations||[]), {
              ...conv, id: uid(),
              ...(isGroup ? { groupId, participants: names } : {}),
            }] }
          : p);
      });
      if (ids.length === 1) setSelectedId(ids[0]);
    }
    setShowConvModal(false); setEditingConv(null); setConvGroupMode(false);
  };

  // Create several contacts at once
  const saveBulkPersons = (persons) => {
    setPeople(prev => [...prev, ...persons]);
    setShowBulkModal(false);
  };

  // Scheduled events (no conversation required) — stored per contact in p.events
  const saveEvent = (event, participantIds) => {
    const ids = participantIds || [];
    setPeople(prev => {
      const isGroup = ids.length > 1;
      const groupId = isGroup ? uid() : (event.groupId || null);
      const names = ids.map(id => prev.find(p=>p.id===id)?.name).filter(Boolean);
      // If editing, drop the old copies of this event id everywhere, then re-add
      const stripped = editingEvent
        ? prev.map(p => ({ ...p, events: (p.events||[]).filter(e=>e.id!==event.id && (!event.groupId || e.groupId!==event.groupId)) }))
        : prev;
      return stripped.map(p => ids.includes(p.id)
        ? { ...p, events: [...(p.events||[]), {
            id: event.id, date: event.date, time: event.time||'', title: event.title||'',
            location: event.location||'', groupId, ...(isGroup ? { participants: names } : {}),
          }] }
        : p);
    });
    setShowEventModal(false); setEditingEvent(null);
  };

  const deleteEvent = (personId, eventId) => {
    if (!confirm('Delete this scheduled event?')) return;
    setPeople(prev => prev.map(p =>
      p.id === personId ? { ...p, events: (p.events||[]).filter(e=>e.id!==eventId) } : p
    ));
  };

  const openAddEvent = ({ date=null, lockedId=null }={}) => {
    setEditingEvent(null);
    setEventDefaults({ date, participantIds: lockedId ? [lockedId] : [], lockedId });
    setShowEventModal(true);
  };

  // Save a conversation to any person by ID (used by Quick Capture)
  const saveConvToPersonId = (personId, conv) => {
    setPeople(prev => prev.map(p =>
      p.id === personId ? { ...p, conversations: [...(p.conversations||[]), conv] } : p
    ));
    setSelectedId(personId);
  };

  // Merge updated fields into an existing person (used by Quick Capture update intent)
  const updatePersonFields = (personId, fields) => {
    setPeople(prev => prev.map(p => {
      if (p.id !== personId) return p;
      return {
        ...p,
        role:     fields.role     || p.role,
        company:  fields.company  || p.company,
        hometown: fields.hometown || p.hometown,
        so:       fields.so       || p.so,
        kids:     fields.kids?.length ? [...new Set([...(p.kids||[]), ...fields.kids])] : (p.kids||[]),
        hobbies:  fields.hobbies?.length ? [...new Set([...(p.hobbies||[]), ...fields.hobbies])] : (p.hobbies||[]),
      };
    }));
    setSelectedId(personId);
  };

  const deleteConv = (personId, convId) => {
    if (!confirm('Delete this conversation entry?')) return;
    setPeople(prev => prev.map(p =>
      p.id === personId ? { ...p, conversations: p.conversations.filter(c=>c.id!==convId) } : p
    ));
  };

  // Patch fields of a single conversation in place (inline follow-up/question edits)
  const patchConv = (personId, convId, patch) => {
    setPeople(prev => prev.map(p =>
      p.id === personId
        ? { ...p, conversations: (p.conversations||[]).map(c => c.id===convId ? { ...c, ...patch } : c) }
        : p
    ));
  };

  if (loadError) return <ErrorScreen error={loadError} onRetry={doLoad} />;
  if (!cloudReady) return <LoadingScreen />;

  // Wrap selection so the mobile drawer closes when you pick a contact
  const pick = (id) => { setSelectedId(id); setSidebarOpen(false); };

  const sidebar = (
    <Sidebar
      people={people} selectedId={selectedId}
      onSelect={pick}
      onAddPerson={() => { setEditingPerson(null); setShowPersonModal(true); setSidebarOpen(false); }}
      onBulkAdd={() => { setShowBulkModal(true); setSidebarOpen(false); }}
      onLogGroup={() => { setEditingConv(null); setConvGroupMode(true); setSelectedId(null); setShowConvModal(true); setSidebarOpen(false); }}
      onAddEvent={() => { openAddEvent(); setSidebarOpen(false); }}
      onQuickCapture={() => { setShowQuickCapture(true); setSidebarOpen(false); }}
      onOpenSettings={() => { setShowSettings(true); setSidebarOpen(false); }}
      onLock={onLock}
      isMobile={isMobile}
      onCloseDrawer={() => setSidebarOpen(false)}
      userEmail={userEmail}
      theme={theme} onToggleTheme={toggleTheme}
      search={search} setSearch={setSearch}
      sortBy={sortBy} setSortBy={setSortBy}
      saveStatus={saveStatus}
    />
  );

  const mainPane = selected ? (
        <PersonDetail
          person={selected}
          people={people}
          onBack={() => setSelectedId(null)}
          onOpenPartner={id => setSelectedId(id)}
          onEditPerson={p => { setEditingPerson(p); setShowPersonModal(true); }}
          onDeletePerson={deletePerson}
          onAddConv={() => { setEditingConv(null); setConvGroupMode(false); setShowConvModal(true); }}
          onEditConv={c => { setEditingConv(c); setShowConvModal(true); }}
          onDeleteConv={deleteConv}
          onPatchConv={patchConv}
          onSchedule={() => openAddEvent({ lockedId: selected.id })}
          onEditEvent={ev => { setEditingEvent({ event:{...ev, _participantIds: ev.groupId ? people.filter(p=>(p.events||[]).some(e=>e.groupId===ev.groupId)).map(p=>p.id) : [selected.id] }, lockedId:null }); setEventDefaults({ date:ev.date, participantIds:[], lockedId:null }); setShowEventModal(true); }}
          onDeleteEvent={deleteEvent}
        />
      ) : (
        <Dashboard
          people={people}
          onSelectPerson={pick}
          onAddPerson={() => { setEditingPerson(null); setShowPersonModal(true); }}
          onBulkAdd={() => setShowBulkModal(true)}
          onLogGroup={() => { setEditingConv(null); setConvGroupMode(true); setSelectedId(null); setShowConvModal(true); }}
          onAddEvent={(date) => openAddEvent({ date })}
          onToggleCommitment={toggleFollowUpDone}
          onSetCommitmentOwner={setFollowUpOwner}
          onForgo={forgoPerson}
        />
      );

  return (
    <div style={{ display:'flex', height:'100%', overflow:'hidden' }}>
      {/* Sidebar: persistent on desktop, slide-in drawer on mobile */}
      {isMobile ? (
        <>
          {sidebarOpen && <div className="drawer-overlay" onClick={()=>setSidebarOpen(false)}
            style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', zIndex:90 }} />}
          <div className="drawer" style={{ position:'fixed', top:0, left:0, bottom:0, zIndex:100,
            transform: sidebarOpen ? 'translateX(0)' : 'translateX(-105%)',
            boxShadow: sidebarOpen ? '0 0 40px rgba(0,0,0,0.25)' : 'none' }}>
            {sidebar}
          </div>
        </>
      ) : sidebar}

      <div style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column', height:'100%' }}>
        {isMobile && <MobileTopBar onMenu={() => setSidebarOpen(true)} />}
        <div style={{ flex:1, minHeight:0, display:'flex', overflow:'hidden' }}>
          {mainPane}
        </div>
      </div>

      {showSettings && (
        <SettingsModal config={config} userEmail={userEmail} onSave={saveConfig} onClose={() => setShowSettings(false)} />
      )}
      {showPersonModal && (
        <PersonModal person={editingPerson} people={people} onSave={savePerson} onClose={() => { setShowPersonModal(false); setEditingPerson(null); }} />
      )}
      {showConvModal && (
        <ConvModal
          conv={editingConv}
          personName={selected?.name}
          people={people}
          initialParticipantIds={editingConv ? [] : (convGroupMode ? [] : (selectedId ? [selectedId] : []))}
          lockedId={editingConv ? null : (convGroupMode ? null : selectedId)}
          onSave={saveConv}
          onClose={() => { setShowConvModal(false); setEditingConv(null); setConvGroupMode(false); }}
        />
      )}
      {showBulkModal && (
        <BulkPersonModal onSave={saveBulkPersons} onClose={() => setShowBulkModal(false)} />
      )}
      {showEventModal && (
        <EventModal
          event={editingEvent?.event || null}
          people={people}
          defaultDate={eventDefaults.date}
          defaultParticipantIds={eventDefaults.participantIds}
          lockedId={eventDefaults.lockedId}
          onSave={saveEvent}
          onClose={() => { setShowEventModal(false); setEditingEvent(null); }}
        />
      )}
      {showQuickCapture && (
        <QuickCapture
          people={people}
          onSaveConvToPersonId={saveConvToPersonId}
          onSavePerson={savePerson}
          onUpdatePersonFields={updatePersonFields}
          onClose={() => setShowQuickCapture(false)}
        />
      )}
    </div>
  );
};

/* ── Mobile top bar ───────────────────────────────────────────────────────── */
const MobileTopBar = ({ onMenu }) => (
  <div className="safe-top" style={{ flexShrink:0, background:T.surface, borderBottom:`1px solid ${T.border}`, display:'flex', alignItems:'center', gap:10, padding:'10px 14px' }}>
    <button onClick={onMenu} aria-label="Open contacts"
      style={{ width:38, height:38, borderRadius:9, border:`1px solid ${T.borderStrong}`, background:T.surface, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <Icon name="menu" size={18} color={T.text} />
    </button>
    <div style={{ fontSize:18, fontWeight:900, color:T.accentStrong, letterSpacing:'-0.5px' }}>▶ Resume</div>
  </div>
);

/* ── Auth screen (Supabase email/password) ────────────────────────────────── */
const AuthScreen = () => {
  const [mode, setMode] = useState('signin'); // 'signin' | 'signup' | 'reset'
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [msg, setMsg] = useState('');
  const [busy, setBusy] = useState(false);

  const go = async () => {
    setErr(''); setMsg('');
    if (!email) return setErr('Enter your email.');
    setBusy(true);
    try {
      if (mode === 'reset') {
        const { error } = await db.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin });
        if (error) setErr(error.message); else setMsg('Password reset link sent — check your email.');
      } else if (mode === 'signup') {
        if (pw.length < 6) { setErr('Password must be at least 6 characters.'); setBusy(false); return; }
        const { data, error } = await db.auth.signUp({ email, password: pw });
        if (error) setErr(error.message);
        else if (!data.session) setMsg('Account created. Check your email to confirm, then sign in.');
        // If confirmations are off, onAuthStateChange signs you in automatically.
      } else {
        const { error } = await db.auth.signInWithPassword({ email, password: pw });
        if (error) setErr(error.message);
        // success → Root's onAuthStateChange swaps to the app
      }
    } catch (e) { setErr(String(e?.message || e)); }
    setBusy(false);
  };

  const inp = { width:'100%', padding:'12px 14px', border:`1px solid ${T.borderStrong}`, borderRadius:10, fontSize:16, color:T.text, background:'var(--surface)', outline:'none' };
  const title = mode === 'signup' ? 'Create your account' : mode === 'reset' ? 'Reset your password' : 'Sign in to Resume';
  const cta = mode === 'signup' ? 'Create account' : mode === 'reset' ? 'Send reset link' : 'Sign in';
  return (
    <div className="safe-top safe-bottom" style={{ minHeight:'100%', display:'flex', alignItems:'center', justifyContent:'center', padding:20, background:'linear-gradient(160deg,var(--accent-soft),var(--bg))' }}>
      <div className="modal-box" style={{ width:'100%', maxWidth:380, background:T.surface, borderRadius:18, padding:'28px 24px', boxShadow:'0 20px 60px rgba(0,0,0,0.12)', border:`1px solid ${T.border}` }}>
        <div style={{ textAlign:'center', marginBottom:20 }}>
          <div style={{ width:54, height:54, borderRadius:14, background:T.accent, display:'inline-flex', alignItems:'center', justifyContent:'center', marginBottom:12 }}>
            <Icon name="lock" size={24} color="white" />
          </div>
          <h1 style={{ fontSize:22, fontWeight:900, color:T.accentStrong, letterSpacing:'-0.5px' }}>▶ Resume</h1>
          <p style={{ fontSize:13, color:T.textSoft, marginTop:6 }}>{title}</p>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} autoFocus
            autoComplete="email" placeholder="Email" style={inp}
            onKeyDown={e=>{ if(e.key==='Enter' && mode==='reset') go(); }} />
          {mode !== 'reset' && (
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
              autoComplete={mode==='signup'?'new-password':'current-password'}
              onKeyDown={e=>{ if(e.key==='Enter') go(); }} placeholder="Password" style={inp} />
          )}
          {err && <p style={{ fontSize:12, color:'#dc2626', textAlign:'center' }}>{err}</p>}
          {msg && <p style={{ fontSize:12, color:'#15803d', textAlign:'center' }}>{msg}</p>}
          <button onClick={go} disabled={busy}
            style={{ marginTop:4, padding:'12px', borderRadius:10, border:'none', background:T.accent, color:'white', fontSize:15, fontWeight:700, cursor: busy?'default':'pointer', opacity: busy?0.7:1 }}>
            {busy ? 'Please wait…' : cta}
          </button>
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', marginTop:14, fontSize:12 }}>
          <button onClick={()=>{ setMode(mode==='signup'?'signin':'signup'); setErr(''); setMsg(''); }}
            style={{ background:'none', border:'none', cursor:'pointer', color:T.accentDeep, fontWeight:600 }}>
            {mode==='signup' ? 'Have an account? Sign in' : 'Create an account'}
          </button>
          {mode!=='reset' && (
            <button onClick={()=>{ setMode('reset'); setErr(''); setMsg(''); }}
              style={{ background:'none', border:'none', cursor:'pointer', color:T.faint }}>
              Forgot password?
            </button>
          )}
          {mode==='reset' && (
            <button onClick={()=>{ setMode('signin'); setErr(''); setMsg(''); }}
              style={{ background:'none', border:'none', cursor:'pointer', color:T.faint }}>
              Back to sign in
            </button>
          )}
        </div>
        <p style={{ fontSize:10.5, color:T.faint, textAlign:'center', marginTop:16, lineHeight:1.5 }}>
          Secured by Supabase Auth. Your contacts sync across phone and computer. First-time setup steps are in AUTH_SETUP.md.
        </p>
      </div>
    </div>
  );
};

/* ── Settings (account + notification preferences) ────────────────────────── */
const SettingsField = ({ label, icon, children, hint }) => (
  <div>
    <Label>{icon && <Icon name={icon} size={12} color="var(--faint)" style={{ marginRight:5, verticalAlign:'-1px' }} />}{label}</Label>
    {children}
    {hint && <p style={{ fontSize:11, color:T.faint, marginTop:4 }}>{hint}</p>}
  </div>
);
const SettingsRow = ({ label, on, onChange }) => (
  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 0' }}>
    <span style={{ fontSize:14, color:'var(--text)' }}>{label}</span>
    <Toggle on={on} onChange={onChange} />
  </div>
);
const SettingsModal = ({ config, userEmail, onSave, onClose }) => {
  const [notify, setNotify] = useState(() => ({ ...DEFAULT_NOTIFY, ...(config?.notify||{}),
    channels:{ ...DEFAULT_NOTIFY.channels, ...(config?.notify?.channels||{}) },
    types:{ ...DEFAULT_NOTIFY.types, ...(config?.notify?.types||{}) } }));
  const [np1, setNp1] = useState(''); const [np2, setNp2] = useState('');
  const [passMsg, setPassMsg] = useState('');
  const [saving, setSaving] = useState(false);
  const setN = (k,v) => setNotify(prev=>({ ...prev, [k]:v }));
  const setCh = (k,v) => setNotify(prev=>({ ...prev, channels:{ ...prev.channels, [k]:v } }));
  const setTy = (k,v) => setNotify(prev=>({ ...prev, types:{ ...prev.types, [k]:v } }));

  const save = async () => {
    setPassMsg('');
    if (np1 || np2) {
      if (np1.length < 6) { setPassMsg('Password must be at least 6 characters.'); return; }
      if (np1 !== np2) { setPassMsg('Passwords don’t match.'); return; }
    }
    setSaving(true);
    if (np1) {
      const { error } = await db.auth.updateUser({ password: np1 });
      if (error) { setSaving(false); setPassMsg(error.message); return; }
    }
    await onSave({ ...config, notify });
    setSaving(false);
    onClose();
  };

  return (
    <div className="modal-bg" style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:200, padding:20 }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box" style={{ background:T.surface, borderRadius:16, width:'100%', maxWidth:520, maxHeight:'92vh', overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'0 25px 60px rgba(0,0,0,0.2)' }}>
        <div style={{ padding:'20px 24px 16px', borderBottom:`1px solid ${T.border}`, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <h2 style={{ fontSize:18, fontWeight:700, color:T.text }}>Settings</h2>
            <p style={{ marginTop:2, fontSize:13, color:T.faint }}>Reminders &amp; passcode</p>
          </div>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:T.faint, padding:4 }}><Icon name="x" size={20} color="currentColor" /></button>
        </div>

        <div style={{ padding:'20px 24px', overflowY:'auto', flex:1, display:'flex', flexDirection:'column', gap:18 }}>
          {/* Reminders */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <Icon name="bell" size={16} color={T.accent} />
              <span style={{ fontSize:15, fontWeight:700, color:T.text }}>Email &amp; text reminders</span>
            </div>
            <Toggle on={notify.enabled} onChange={v=>setN('enabled',v)} />
          </div>

          {notify.enabled && (
            <div style={{ display:'flex', flexDirection:'column', gap:16, padding:'4px 2px' }}>
              <SettingsField label="Email address" icon="mail" hint="Daily digest is sent here.">
                <Input type="email" value={notify.email} onChange={e=>setN('email',e.target.value)} placeholder="you@example.com" />
              </SettingsField>
              <SettingsField label="Mobile number" icon="phone" hint="Include country code, e.g. +14155551234.">
                <Input type="tel" value={notify.phone} onChange={e=>setN('phone',e.target.value)} placeholder="+14155551234" />
              </SettingsField>
              <SettingsField label="Remind me how many days ahead?">
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <input type="number" min={0} max={30} value={notify.leadDays}
                    onChange={e=>setN('leadDays', Math.max(0, Math.min(30, parseInt(e.target.value)||0)))}
                    style={{ width:64, padding:'8px 10px', border:`1px solid ${T.borderStrong}`, borderRadius:8, fontSize:14, textAlign:'center' }} />
                  <span style={{ fontSize:14, color:T.textSoft }}>day(s) before</span>
                </div>
              </SettingsField>
              <div>
                <Label>Send via</Label>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                  <Chip active={notify.channels.email} onClick={()=>setCh('email', !notify.channels.email)}>✉️ Email</Chip>
                  <Chip active={notify.channels.sms} onClick={()=>setCh('sms', !notify.channels.sms)}>💬 Text (SMS)</Chip>
                </div>
              </div>
              <div style={{ padding:'4px 14px', background:T.bg, borderRadius:10, border:`1px solid ${T.border}` }}>
                <SettingsRow label="Upcoming events" on={notify.types.events} onChange={v=>setTy('events',v)} />
                <SettingsRow label="Scheduled meetings" on={notify.types.meetings} onChange={v=>setTy('meetings',v)} />
                <SettingsRow label="Birthdays" on={notify.types.birthdays} onChange={v=>setTy('birthdays',v)} />
              </div>
              <p style={{ fontSize:11, color:T.faint, lineHeight:1.5, background:T.accentSoft, padding:'10px 12px', borderRadius:8 }}>
                Sending requires the one-time backend setup in <b>NOTIFICATIONS.md</b> (a scheduled Supabase function with your Resend &amp; Twilio keys). These preferences are read by that job.
              </p>
            </div>
          )}

          {/* Passcode */}
          <div style={{ borderTop:`1px solid ${T.border}`, paddingTop:16 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
              <Icon name="lock" size={16} color={T.textSoft} />
              <span style={{ fontSize:15, fontWeight:700, color:T.text }}>Account</span>
            </div>
            {userEmail && <p style={{ fontSize:12, color:T.textSoft, marginBottom:10 }}>Signed in as <b>{userEmail}</b></p>}
            <Label>Change password</Label>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }} className="r-cols2">
              <Input type="password" autoComplete="new-password" value={np1} onChange={e=>setNp1(e.target.value)} placeholder="New password" />
              <Input type="password" autoComplete="new-password" value={np2} onChange={e=>setNp2(e.target.value)} placeholder="Confirm" />
            </div>
            {passMsg && <p style={{ fontSize:12, color:'#dc2626', marginTop:8 }}>{passMsg}</p>}
            <p style={{ fontSize:11, color:T.faint, marginTop:6 }}>Leave blank to keep your current password. Minimum 6 characters.</p>
          </div>
        </div>

        <div style={{ padding:'14px 24px', borderTop:`1px solid ${T.border}`, display:'flex', gap:8, justifyContent:'flex-end' }}>
          <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
          <Btn onClick={save} style={{ opacity: saving?0.6:1 }}>{saving ? 'Saving…' : 'Save settings'}</Btn>
        </div>
      </div>
    </div>
  );
};

/* ── Root: Supabase Auth gate, then load settings + app ───────────────────── */
const Root = () => {
  const [session, setSession] = useState(undefined); // undefined=loading, null=signed out, obj=signed in
  const [config, setConfig] = useState(null);
  const [configReady, setConfigReady] = useState(false);

  useEffect(() => {
    db.auth.getSession().then(({ data }) => setSession(data.session || null)).catch(() => setSession(null));
    const { data: sub } = db.auth.onAuthStateChange((_event, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  const userId = session?.user?.id;

  useEffect(() => {
    if (!userId) { setConfigReady(false); return; }
    loadConfig(userId)
      .then(c => { setConfig(c || { notify: { ...DEFAULT_NOTIFY } }); setConfigReady(true); })
      .catch(() => { setConfig({ notify: { ...DEFAULT_NOTIFY } }); setConfigReady(true); });
  }, [userId]);

  const saveConfig = async (next) => { setConfig(next); await persistConfig(userId, next); };
  const onLock = () => { db.auth.signOut(); };

  if (session === undefined) return <LoadingScreen />;
  if (!session) return <AuthScreen />;
  if (!configReady) return <LoadingScreen />;
  return <App config={config} saveConfig={saveConfig} onLock={onLock} userEmail={session.user?.email} userId={userId} />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
