const QuickCapture = ({ people, onSaveConvToPersonId, onSavePerson, onUpdatePersonFields, onClose }) => {
  const [text, setText] = useState('');
  const [parsed, setParsed] = useState(null);
  const [editedParsed, setEditedParsed] = useState(null);
  const [saved, setSaved] = useState(false);
  const [listening, setListening] = useState(false);
  const textRef = React.useRef(null);
  const recognitionRef = React.useRef(null);

  React.useEffect(() => { setTimeout(() => textRef.current?.focus(), 50); }, []);

  const toggleMic = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Speech recognition is not supported in this browser. Try Chrome or Edge.'); return; }

    if (listening) {
      recognitionRef.current?.stop();
      setListening(false);
      return;
    }

    const rec = new SR();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = 'en-US';
    recognitionRef.current = rec;

    let finalTranscript = text;
    rec.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) { finalTranscript += (finalTranscript ? ' ' : '') + t; }
        else { interim = t; }
      }
      setText(finalTranscript + (interim ? ' ' + interim : ''));
    };
    rec.onend = () => { setText(finalTranscript); setListening(false); };
    rec.onerror = (e) => { console.warn('Speech error:', e.error); setListening(false); };

    rec.start();
    setListening(true);
  };

  React.useEffect(() => {
    return () => { recognitionRef.current?.stop(); };
  }, []);

  const handleParse = () => {
    if (!text.trim()) return;
    const result = parseNaturalInput(text.trim(), people);
    setParsed(result);
    setEditedParsed({ ...result });
  };

  const handleSave = () => {
    if (!editedParsed || editedParsed.intent === 'unclear') return;
    const ep = editedParsed;

    const conv = {
      id: uid(), date: ep.date, location: ep.location || '',
      topics: ep.topics, insights: ep.insights,
      openQuestions: ep.openQuestions, followUps: ep.followUps,
      notes: '', nextMeeting: '', nextMeetingNote: '',
    };

    if (ep.intent === 'conversation' && ep.matchedPerson) {
      onSaveConvToPersonId(ep.matchedPerson.id, conv);
    } else if (ep.intent === 'new_person') {
      // Normalize birthday: accept "March 15" style in the editable field too
      const normBday = (raw) => {
        if (!raw) return '';
        if (/^\d{2}-\d{2}$/.test(raw)) return raw; // already MM-DD
        const BMONTHS = { january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12,
          jan:1,feb:2,mar:3,apr:4,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12 };
        const m = raw.match(/^([A-Za-z]+)\s+(\d{1,2})$/) || raw.match(/^(\d{1,2})\s+([A-Za-z]+)$/);
        if (m) {
          let mo, dy;
          if (isNaN(parseInt(m[1], 10))) { mo = BMONTHS[m[1].toLowerCase()]; dy = parseInt(m[2], 10); }
          else { dy = parseInt(m[1], 10); mo = BMONTHS[m[2].toLowerCase()]; }
          if (mo && dy) return String(mo).padStart(2,'0') + '-' + String(dy).padStart(2,'0');
        }
        return raw;
      };
      onSavePerson({
        id: uid(), name: ep.newName, role: ep.role || '',
        company: ep.company || '', howMet: ep.location || '',
        hometown: ep.hometown || '', so: ep.so || '',
        kids: ep.kids || [], birthday: normBday(ep.birthday), hobbies: ep.hobbies || [],
        groups: [], followUpEnabled: true, followUpDays: 60,
        additionalInfo: '',
        createdAt: new Date().toISOString().slice(0, 10),
        conversations: [conv],
      });
    } else if (ep.intent === 'update' && ep.matchedPerson) {
      const normBday = (raw) => {
        if (!raw) return undefined;
        if (/^\d{2}-\d{2}$/.test(raw)) return raw;
        const BMONTHS = { january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12,
          jan:1,feb:2,mar:3,apr:4,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12 };
        const m = raw.match(/^([A-Za-z]+)\s+(\d{1,2})$/) || raw.match(/^(\d{1,2})\s+([A-Za-z]+)$/);
        if (m) {
          let mo, dy;
          if (isNaN(parseInt(m[1], 10))) { mo = BMONTHS[m[1].toLowerCase()]; dy = parseInt(m[2], 10); }
          else { dy = parseInt(m[1], 10); mo = BMONTHS[m[2].toLowerCase()]; }
          if (mo && dy) return String(mo).padStart(2,'0') + '-' + String(dy).padStart(2,'0');
        }
        return raw;
      };
      const updateFields = { role: ep.role, company: ep.company, hometown: ep.hometown,
        so: ep.so, kids: ep.kids, hobbies: ep.hobbies };
      const nb = normBday(ep.birthday);
      if (nb) updateFields.birthday = nb;
      onUpdatePersonFields(ep.matchedPerson.id, updateFields);
    }

    setSaved(true);
    setTimeout(onClose, 1600);
  };

  const handleReset = () => { setText(''); setParsed(null); setEditedParsed(null); };
  // Clear parse result only — keeps text so user can tweak and re-parse
  const handleReparse = () => { setParsed(null); setEditedParsed(null); };

  const canSave = editedParsed && editedParsed.intent !== 'unclear';

  const savedMsg = !editedParsed ? '' :
    editedParsed.intent === 'conversation' ? `Conversation added to ${editedParsed.matchedPerson?.name}` :
    editedParsed.intent === 'new_person' ? `${editedParsed.newName} added to your contacts` :
    editedParsed.intent === 'update' ? `${editedParsed.matchedPerson?.name}'s profile updated` : 'Saved';

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:200, padding:20 }}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background:'var(--surface)', borderRadius:16, width:'100%', maxWidth:580, maxHeight:'90vh', overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'0 24px 64px rgba(0,0,0,0.18)' }}>

        {/* Header */}
        <div style={{ padding:'18px 22px 14px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'flex-start', justifyContent:'space-between', flexShrink:0 }}>
          <div>
            <h2 style={{ fontSize:17, fontWeight:800, color:'var(--text-strong)', display:'flex', alignItems:'center', gap:8 }}>
              <Icon name="pen" size={16} color="var(--accent)" /> Quick capture
            </h2>
            <p style={{ fontSize:12, color:'var(--faint)', marginTop:3 }}>Type what you remember — I'll pull out the key details</p>
          </div>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--faint)', padding:4, display:'flex', alignItems:'center' }}>
            <Icon name="x" size={18} color="currentColor" />
          </button>
        </div>

        {/* Body */}
        <div style={{ flex:1, overflowY:'auto', padding:'16px 22px', display:'flex', flexDirection:'column', gap:12 }}>
          {/* Editable parsed result */}
          {parsed && editedParsed && !saved && (
            <EditableParsed parsed={parsed} ep={editedParsed} onChange={setEditedParsed} />
          )}

          {/* Success */}
          {saved && (
            <div style={{ textAlign:'center', padding:'36px 0' }}>
              <div style={{ fontSize:48, marginBottom:12 }}>✅</div>
              <p style={{ fontSize:16, fontWeight:700, color:'var(--text-strong)' }}>Saved!</p>
              <p style={{ fontSize:13, color:'var(--faint)', marginTop:5 }}>{savedMsg}</p>
            </div>
          )}
        </div>

        {/* Input + actions */}
        {!saved && (
          <div style={{ padding:'14px 22px 20px', borderTop:'1px solid var(--border)', flexShrink:0 }}>
            <div style={{ position:'relative' }}>
              <textarea ref={textRef} value={text} onChange={e => setText(e.target.value)} rows={6}
                placeholder={"What do you remember? (or tap the mic and speak)"}
                wrap="soft"
                style={{ width:'100%', minHeight:120, maxHeight:'45vh', padding:'11px 42px 11px 13px', border:'1px solid var(--border-strong)', borderRadius:10, fontSize:14, lineHeight:'1.6', resize:'vertical', color:'var(--text)', background:'var(--bg)', fontFamily:'inherit', boxSizing:'border-box', outline:'none', whiteSpace:'pre-wrap', overflowWrap:'anywhere', transition:'border-color 0.15s' }}
                onFocus={e => e.currentTarget.style.borderColor = listening ? '#f87171' : 'var(--accent-border)'}
                onBlur={e => e.currentTarget.style.borderColor = listening ? '#f87171' : 'var(--border-strong)'}
                onKeyDown={e => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); parsed ? handleSave() : handleParse(); } }}
              />
              <button onClick={toggleMic} title={listening ? 'Stop dictation' : 'Start dictation'}
                style={{ position:'absolute', top:10, right:10, padding:6, borderRadius:7, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', background: listening ? '#ef4444' : 'var(--border)', color: listening ? 'white' : 'var(--text-soft)', animation: listening ? 'micPulse 1.2s ease-in-out infinite' : 'none', transition:'background 0.15s, color 0.15s' }}
                onMouseEnter={e => { if (!listening) { e.currentTarget.style.background='var(--border-strong)'; } }}
                onMouseLeave={e => { if (!listening) { e.currentTarget.style.background='var(--border)'; } }}>
                <Icon name="mic" size={16} color="currentColor" />
              </button>
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:10 }}>
              <span style={{ fontSize:11, color:'var(--faintest)' }}>⌘↵ to {parsed ? 'save' : 'parse'}</span>
              <div style={{ display:'flex', gap:8 }}>
                {parsed && (<>
                  <button onClick={handleReparse}
                    title="Edit your text and try parsing again"
                    style={{ padding:'7px 14px', background:'#f0f9ff', border:'1px solid #bae6fd', borderRadius:8, fontSize:13, color:'#0369a1', cursor:'pointer', fontWeight:500, transition:'background 0.1s' }}
                    onMouseEnter={e => e.currentTarget.style.background = '#e0f2fe'}
                    onMouseLeave={e => e.currentTarget.style.background = '#f0f9ff'}>
                    ↺ Re-parse
                  </button>
                  <button onClick={handleReset}
                    title="Clear everything and start fresh"
                    style={{ padding:'7px 14px', background:'var(--bg)', border:'1px solid var(--border-strong)', borderRadius:8, fontSize:13, color:'var(--text-soft)', cursor:'pointer', fontWeight:500, transition:'background 0.1s' }}
                    onMouseEnter={e => e.currentTarget.style.background = 'var(--border)'}
                    onMouseLeave={e => e.currentTarget.style.background = 'var(--bg)'}>
                    ✕ Clear
                  </button>
                </>)}
                {!parsed ? (
                  <button onClick={handleParse} disabled={!text.trim()}
                    style={{ padding:'7px 20px', background: text.trim() ? 'var(--accent)' : 'var(--border-strong)', color: text.trim() ? 'white' : 'var(--faint)', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor: text.trim() ? 'pointer' : 'default', transition:'all 0.15s' }}>
                    Parse →
                  </button>
                ) : (
                  <button onClick={handleSave} disabled={!canSave}
                    style={{ padding:'7px 20px', background: canSave ? 'var(--accent)' : 'var(--border-strong)', color: canSave ? 'white' : 'var(--faint)', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor: canSave ? 'pointer' : 'default' }}>
                    Save →
                  </button>
                )}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ── Sidebar ──────────────────────────────────────────────────────────────── */
const Sidebar = ({ people, selectedId, onSelect, onAddPerson, onBulkAdd, onLogGroup, onAddEvent, onQuickCapture, onOpenSettings, onLock, isMobile, onCloseDrawer, userEmail, theme, onToggleTheme, search, setSearch, sortBy, setSortBy, saveStatus }) => {
  const [activeGroup, setActiveGroup] = useState(null);
  const [addMenu, setAddMenu] = useState(false);
  const addRef = useRef(null);
  useEffect(() => {
    if (!addMenu) return;
    const close = (e) => { if (addRef.current && !addRef.current.contains(e.target)) setAddMenu(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [addMenu]);
  const overdueCount = people.filter(p=>getStatus(p)==='overdue').length;
  const isSearching = search.trim().length > 0;

  // All unique groups sorted alphabetically
  const allGroups = useMemo(() => {
    const s = new Set(people.flatMap(p=>p.groups||[]));
    return [...s].sort();
  }, [people]);

  const filtered = useMemo(() => {
    if (isSearching) return [];
    let list = [...people];
    if (activeGroup) list = list.filter(p=>p.groups?.includes(activeGroup));
    if (sortBy==='name') return list.sort((a,b)=>a.name.localeCompare(b.name));
    if (sortBy==='recent') return list.sort((a,b)=>(lastConvDate(b)||'0').localeCompare(lastConvDate(a)||'0'));
    if (sortBy==='attention') {
      const order = { overdue:0, soon:1, new:2, ok:3, off:4 };
      return list.sort((a,b)=>(order[getStatus(a)]||5)-(order[getStatus(b)]||5));
    }
    return list;
  }, [people, sortBy, isSearching, activeGroup]);

  const searchResults = useMemo(() => {
    const results = isSearching ? deepSearch(people, search) : [];
    return activeGroup ? results.filter(r=>r.person.groups?.includes(activeGroup)) : results;
  }, [people, search, isSearching, activeGroup]);

  return (
    <div className="safe-top" style={{ width: isMobile ? 'min(300px, 84vw)' : 300, flexShrink:0, background:'var(--surface)', borderRight:'1px solid var(--border)', display:'flex', flexDirection:'column', height:'100%' }}>
      {/* Header */}
      <div style={{ padding:'18px 16px 12px' }}>
        {isMobile && (
          <div style={{ display:'flex', justifyContent:'flex-end', marginBottom:4 }}>
            <button onClick={onCloseDrawer} aria-label="Close menu"
              style={{ background:'none', border:'none', cursor:'pointer', color:'var(--faint)', padding:4 }}>
              <Icon name="x" size={20} color="currentColor" />
            </button>
          </div>
        )}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
          <button onClick={() => onSelect(null)} title="Go to dashboard"
            style={{ background:'none', border:'none', cursor:'pointer', padding:0, textAlign:'left', transition:'opacity 0.15s' }}
            onMouseEnter={e=>e.currentTarget.style.opacity='0.75'}
            onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
            <div style={{ fontSize:22, fontWeight:900, color:'var(--accent-strong)', letterSpacing:'-0.5px', lineHeight:1 }}>▶ Resume</div>
            <div style={{ fontSize:11, color:'var(--faint)', marginTop:2, letterSpacing:'0.03em' }}>Remember what matters</div>
            {saveStatus === 'saving'  && <div style={{ fontSize:10, color:'var(--accent)', marginTop:2, display:'flex', alignItems:'center', gap:3 }}><span style={{ display:'inline-block', width:6, height:6, borderRadius:'50%', background:'var(--accent)', animation:'pulse 1s infinite' }}></span>Saving…</div>}
            {saveStatus === 'pending' && <div style={{ fontSize:10, color:'#f59e0b', marginTop:2, display:'flex', alignItems:'center', gap:3 }}><span style={{ display:'inline-block', width:6, height:6, borderRadius:'50%', background:'#f59e0b' }}></span>Unsaved changes</div>}
          </button>
          <div style={{ display:'flex', gap:6 }}>
            <button onClick={onQuickCapture} title="Quick capture"
              style={{ width:34, height:34, borderRadius:10, background:'var(--accent-soft)', border:'1px solid var(--accent-border)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.1s' }}
              onMouseEnter={e=>{ e.currentTarget.style.background='var(--accent-soft-2)'; e.currentTarget.style.transform='scale(1.05)'; }}
              onMouseLeave={e=>{ e.currentTarget.style.background='var(--accent-soft)'; e.currentTarget.style.transform='scale(1)'; }}>
              <Icon name="pen" size={15} color="var(--accent)" />
            </button>
            <div ref={addRef} style={{ position:'relative' }}>
              <button onClick={()=>setAddMenu(m=>!m)} title="Add"
                style={{ width:34, height:34, borderRadius:10, background:'var(--accent)', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 2px 8px rgba(242,107,29,0.35)', transition:'transform 0.1s' }}
                onMouseEnter={e=>e.currentTarget.style.transform='scale(1.05)'}
                onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
                <Icon name="plus" size={18} color="white" />
              </button>
              {addMenu && (
                <div style={{ position:'absolute', top:'calc(100% + 6px)', right:0, zIndex:80, background:T.surface, border:`1px solid ${T.borderStrong}`, borderRadius:12, boxShadow:'0 10px 32px rgba(0,0,0,0.14)', padding:6, minWidth:208 }}>
                  {[
                    { ic:'user',     label:'New contact',        sub:'Add one person',          fn:onAddPerson },
                    { ic:'users',    label:'Add multiple',       sub:'Paste a list of names',   fn:onBulkAdd },
                    { ic:'msg',      label:'Log group gathering',sub:'One log, many people',    fn:onLogGroup },
                    { ic:'calendar', label:'Schedule event',     sub:'Plan something ahead',    fn:onAddEvent },
                  ].map(item => (
                    <button key={item.label} onClick={()=>{ setAddMenu(false); item.fn(); }}
                      style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'9px 10px', background:'none', border:'none', borderRadius:8, cursor:'pointer', textAlign:'left' }}
                      onMouseEnter={e=>e.currentTarget.style.background=T.bg}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <span style={{ width:30, height:30, borderRadius:8, background:T.accentSoft, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                        <Icon name={item.ic} size={15} color={T.accent} />
                      </span>
                      <div>
                        <p style={{ fontSize:13, fontWeight:600, color:T.text, lineHeight:1.25 }}>{item.label}</p>
                        <p style={{ fontSize:11, color:T.faint, lineHeight:1.25 }}>{item.sub}</p>
                      </div>
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
        {/* Search bar */}
        <div style={{ position:'relative' }}>
          <span style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }}>
            <Icon name="search" size={14} color={isSearching?'var(--accent)':'var(--faint)'} />
          </span>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search names, places, topics…"
            style={{ width:'100%', padding:'8px 30px 8px 32px', border:`1px solid ${isSearching?'var(--accent-border)':'var(--border)'}`, borderRadius:8, fontSize:13, background: isSearching?'var(--accent-soft)':'var(--bg)', color:'var(--text)', transition:'all 0.15s' }} />
          {isSearching && (
            <button onClick={()=>setSearch('')}
              style={{ position:'absolute', right:8, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:'var(--faint)', display:'flex', alignItems:'center', padding:2 }}
              onMouseEnter={e=>e.currentTarget.style.color='var(--text)'}
              onMouseLeave={e=>e.currentTarget.style.color='var(--faint)'}>
              <Icon name="x" size={13} color="currentColor" />
            </button>
          )}
        </div>
        {/* Search hint */}
        {!isSearching && (
          <p style={{ fontSize:11, color:'var(--faintest)', marginTop:5, textAlign:'center' }}>
            Search by location, topic, hobby, any detail you remember
          </p>
        )}
      </div>

      {/* Group filter chips */}
      {allGroups.length > 0 && (
        <div style={{ padding:'8px 14px 10px', borderBottom:'1px solid var(--bg)', overflowX:'auto' }}>
          <div style={{ display:'flex', gap:5, flexWrap:'nowrap' }}>
            <Chip active={!activeGroup} onClick={()=>setActiveGroup(null)}>All</Chip>
            {allGroups.map(g => (
              <Chip key={g} active={activeGroup===g} onClick={()=>setActiveGroup(activeGroup===g?null:g)}>{g}</Chip>
            ))}
          </div>
        </div>
      )}

      {/* Stats + sort — only shown when not searching */}
      {!isSearching && (
        <div style={{ padding:'4px 16px 8px', borderBottom:'1px solid var(--bg)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <span style={{ fontSize:12, color:'var(--faint)' }}>{people.length} contact{people.length!==1?'s':''}</span>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
            style={{ fontSize:12, color:'var(--text-soft)', border:'none', background:'transparent', cursor:'pointer', outline:'none' }}>
            <option value="recent">Recent first</option>
            <option value="name">A – Z</option>
            <option value="attention">Needs attention</option>
          </select>
        </div>
      )}

      {/* Overdue alert — only shown when not searching */}
      {overdueCount > 0 && !isSearching && (
        <div style={{ margin:'8px 10px 0', padding:'8px 12px', background:'#fef2f2', borderRadius:8, border:'1px solid #fecaca', fontSize:12, color:'#991b1b', display:'flex', alignItems:'center', gap:6 }}>
          <Icon name="bell" size={13} color="#ef4444" />
          {overdueCount} contact{overdueCount>1?'s':''} overdue for follow-up
        </div>
      )}

      {/* List or Search Results */}
      <div style={{ flex:1, overflowY:'auto', padding:'6px 8px 8px' }}>
        {isSearching ? (
          <SearchResults results={searchResults} query={search} onSelect={onSelect} selectedId={selectedId} />
        ) : (
          <>
            {filtered.length === 0 && (
              <p style={{ fontSize:14, color:'var(--faint)', textAlign:'center', marginTop:40 }}>No contacts yet</p>
            )}
            {filtered.map(p => {
              const st = getStatus(p);
              const last = lastConvDate(p);
              const sel = p.id === selectedId;
              return (
                <div key={p.id} className="person-row"
                  onClick={() => onSelect(p.id)}
                  style={{ padding:'9px 10px', borderRadius:10, cursor:'pointer', marginBottom:2, background: sel ? 'var(--accent-soft)' : 'transparent', display:'flex', alignItems:'center', gap:10 }}
                  onMouseEnter={e=>{ if(!sel) e.currentTarget.style.background='var(--bg)'; }}
                  onMouseLeave={e=>{ if(!sel) e.currentTarget.style.background='transparent'; }}>
                  <div style={{ position:'relative', flexShrink:0 }}>
                    <Avatar name={p.name} size={38} />
                    {st !== 'off' && (
                      <span style={{ position:'absolute', bottom:0, right:0, width:10, height:10, borderRadius:'50%', background:STATUS_COLOR[st], border:'2px solid white' }} />
                    )}
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <p style={{ fontSize:14, fontWeight:600, color:'var(--text-strong)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{p.name}</p>
                    <p style={{ fontSize:12, color:'var(--faint)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', marginTop:1 }}>
                      {last ? fmt(last) : (p.company || 'No conversations yet')}
                    </p>
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>

      {/* Footer: signed-in email + settings + sign out */}
      <div className="safe-bottom" style={{ borderTop:'1px solid var(--border)', padding:'8px 10px' }}>
        {userEmail && (
          <div style={{ display:'flex', alignItems:'center', gap:6, padding:'2px 6px 8px', fontSize:11, color:'var(--faint)', overflow:'hidden' }}>
            <Icon name="user" size={12} color="var(--faint)" />
            <span style={{ whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{userEmail}</span>
          </div>
        )}
        <div style={{ display:'flex', gap:6 }}>
          <button onClick={onToggleTheme} title={theme==='dark' ? 'Switch to light mode' : 'Switch to night mode'}
            style={{ display:'flex', alignItems:'center', justifyContent:'center', width:38, padding:'9px', borderRadius:9, border:'1px solid var(--border-strong)', background:'var(--surface)', cursor:'pointer', flexShrink:0 }}
            onMouseEnter={e=>e.currentTarget.style.background='var(--bg)'}
            onMouseLeave={e=>e.currentTarget.style.background='var(--surface)'}>
            <Icon name={theme==='dark' ? 'sun' : 'moon'} size={15} color="var(--text-soft)" />
          </button>
          <button onClick={onOpenSettings} title="Settings & reminders"
            style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', gap:7, padding:'9px', borderRadius:9, border:'1px solid var(--border-strong)', background:'var(--surface)', cursor:'pointer', fontSize:13, fontWeight:600, color:'var(--text)' }}
            onMouseEnter={e=>e.currentTarget.style.background='var(--bg)'}
            onMouseLeave={e=>e.currentTarget.style.background='var(--surface)'}>
            <Icon name="settings" size={15} color="var(--text-soft)" />Settings
          </button>
          <button onClick={onLock} title="Sign out"
            style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:7, padding:'9px 12px', borderRadius:9, border:'1px solid var(--border-strong)', background:'var(--surface)', cursor:'pointer', fontSize:13, fontWeight:600, color:'var(--text)' }}
            onMouseEnter={e=>e.currentTarget.style.background='var(--bg)'}
            onMouseLeave={e=>e.currentTarget.style.background='var(--surface)'}>
            <Icon name="logout" size={15} color="var(--text-soft)" />Sign out
          </button>
        </div>
      </div>
    </div>
  );
};

/* ── Dashboard Sub-components ─────────────────────────────────────────────── */
const StatCard = ({ icon, label, value, trend, accent }) => (
  <div style={{ background:'var(--surface)', borderRadius:12, padding:'16px 18px', border:'1px solid var(--border)', boxShadow:'0 1px 3px rgba(0,0,0,0.05)' }}>
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
      <span style={{ fontSize:22 }}>{icon}</span>
      {trend !== undefined && trend !== 0 && (
        <span style={{ fontSize:12, color: trend>0?'#10b981':'var(--faint)', fontWeight:700, background: trend>0?'#f0fdf4':'var(--bg)', padding:'2px 7px', borderRadius:99 }}>
          {trend>0?'↑':''}{trend>0?`+${trend}`:`${trend}`} mo
        </span>
      )}
    </div>
    <p style={{ fontSize:30, fontWeight:900, color: accent||'var(--text-strong)', lineHeight:1, marginBottom:4 }}>{value}</p>
    <p style={{ fontSize:12, color:'var(--faint)' }}>{label}</p>
  </div>
);

const BUCKETS = [
  { key:'mo3',  label:'3 – 6 months',   color:'#f59e0b', bg:'#fffbeb', border:'#fde68a' },
  { key:'mo6',  label:'6 – 9 months',   color:'#f97316', bg:'#fff7ed', border:'#fed7aa' },
  { key:'mo9',  label:'9 – 12 months',  color:'#ef4444', bg:'#fef2f2', border:'#fecaca' },
  { key:'mo12', label:'12+ months',     color:'#9f1239', bg:'#fff1f2', border:'#fecdd3' },
];

const CatchUpSection = ({ buckets, catchupTotal, onSelect, onForgo }) => (
  <div style={{ background:'var(--surface)', borderRadius:12, padding:'18px 20px', border:'1px solid var(--border)', boxShadow:'0 1px 3px rgba(0,0,0,0.05)' }}>
    <h3 style={{ fontSize:14, fontWeight:700, color:'var(--text-strong)', marginBottom:2 }}>Time to catch up</h3>
    <p style={{ fontSize:12, color:'var(--faint)', marginBottom:16 }}>
      {catchupTotal > 0
        ? `${catchupTotal} contact${catchupTotal>1?'s':''} haven't heard from you in a while`
        : "Everyone's been heard from recently 🎉"}
    </p>

    {catchupTotal === 0 && (
      <div style={{ textAlign:'center', padding:'24px 0' }}>
        <div style={{ fontSize:32, marginBottom:8 }}>🎉</div>
        <p style={{ fontSize:14, color:'var(--faint)' }}>All caught up!</p>
      </div>
    )}

    {BUCKETS.map(({ key, label, color, bg, border }) => {
      const list = buckets[key];
      if (!list.length) return null;
      return (
        <div key={key} style={{ marginBottom:14 }}>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:7 }}>
            <span style={{ width:8, height:8, borderRadius:'50%', background:color, flexShrink:0 }} />
            <span style={{ fontSize:11, fontWeight:700, color, textTransform:'uppercase', letterSpacing:'0.06em' }}>{label}</span>
            <span style={{ fontSize:11, color:'var(--faint)' }}>· {list.length}</span>
          </div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {list.map(p => {
              const days = lastConvDate(p) ? daysSince(lastConvDate(p)) : null;
              const mo = days ? Math.round(days/30) : null;
              return (
                <div key={p.id} style={{ display:'flex', alignItems:'center', background:bg, border:`1px solid ${border}`, borderRadius:99 }}>
                  <button onClick={() => onSelect(p.id)}
                    style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 8px 5px 5px',
                      background:'none', border:'none', borderRadius:'99px 0 0 99px', cursor:'pointer',
                      transition:'filter 0.1s' }}
                    onMouseEnter={e=>e.currentTarget.style.filter='brightness(0.95)'}
                    onMouseLeave={e=>e.currentTarget.style.filter='brightness(1)'}>
                    <Avatar name={p.name} size={22} />
                    <span style={{ fontSize:13, color:'var(--text)', fontWeight:500 }}>{p.name}</span>
                    <span style={{ fontSize:11, color:'var(--faint)' }}>{mo ? `${mo}mo` : 'never'}</span>
                  </button>
                  <button onClick={() => onForgo(p.id)} title="No regular follow-up needed"
                    style={{ display:'flex', alignItems:'center', justifyContent:'center', width:20, height:20, marginRight:5,
                      background:'rgba(0,0,0,0.06)', border:'none', borderRadius:'50%', cursor:'pointer',
                      color:'var(--faint)', fontSize:11, lineHeight:1, transition:'all 0.1s', flexShrink:0 }}
                    onMouseEnter={e=>{ e.currentTarget.style.background='rgba(0,0,0,0.15)'; e.currentTarget.style.color='var(--text)'; }}
                    onMouseLeave={e=>{ e.currentTarget.style.background='rgba(0,0,0,0.06)'; e.currentTarget.style.color='var(--faint)'; }}>
                    ×
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );
    })}
    <p style={{ fontSize:11, color:'var(--faintest)', marginTop:12 }}>× removes someone from this list — use when regular check-ins aren't needed. Contacts auto-drop after 15 months.</p>
  </div>
);

/* ── Calendar Section ─────────────────────────────────────────────────────── */
const EVT_COLOR = { event:T.accent, meeting:T.teal, birthday:T.rose };
const CalendarSection = ({ people, onSelectPerson, onAddEvent }) => {
  const today = new Date();
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [popoverDay, setPopoverDay] = useState(null);

  // Close popover on outside click
  React.useEffect(() => {
    if (popoverDay === null) return;
    const close = () => setPopoverDay(null);
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, [popoverDay]);

  const prevMonth = () => {
    if (viewMonth === 0) { setViewYear(y => y-1); setViewMonth(11); }
    else setViewMonth(m => m-1);
  };
  const nextMonth = () => {
    if (viewMonth === 11) { setViewYear(y => y+1); setViewMonth(0); }
    else setViewMonth(m => m+1);
  };
  const dateStr = (day) => `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

  // Collect scheduled events + meetings + birthdays for the viewed month.
  // Group events (shared groupId) are de-duplicated so they show once.
  const monthEvents = useMemo(() => {
    const map = {};
    const add = (day, entry) => { if (!map[day]) map[day]=[]; map[day].push(entry); };
    const seenGroups = new Set();
    people.forEach(p => {
      // Standalone scheduled events
      (p.events||[]).forEach(ev => {
        if (!ev.date) return;
        if (ev.groupId) { if (seenGroups.has(ev.groupId)) return; seenGroups.add(ev.groupId); }
        const d = new Date(ev.date+'T12:00:00');
        if (d.getFullYear()===viewYear && d.getMonth()===viewMonth) {
          const who = ev.participants?.length ? ev.participants.join(', ') : p.name;
          add(d.getDate(), { person:p, eventId:ev.id, label:[ev.time, ev.title||'Event'].filter(Boolean).join(' · '), sub:who, type:'event' });
        }
      });
      // Scheduled meetings (from conversations)
      (p.conversations||[]).forEach(c => {
        if (!c.nextMeeting) return;
        const d = new Date(c.nextMeeting+'T12:00:00');
        if (d.getFullYear()===viewYear && d.getMonth()===viewMonth)
          add(d.getDate(), { person:p, label:c.nextMeetingNote||'Catch-up', sub:p.name, type:'meeting' });
      });
      // Birthdays (year-independent)
      if (p.birthday) {
        const bp = p.birthday.split('-');
        const bMo = parseInt(bp.length === 3 ? bp[1] : bp[0], 10) - 1;
        const bDy = parseInt(bp.length === 3 ? bp[2] : bp[1], 10);
        if (bMo === viewMonth)
          add(bDy, { person:p, label:`${p.name.split(' ')[0]}'s birthday 🎂`, sub:p.name, type:'birthday' });
      }
    });
    return map;
  }, [people, viewYear, viewMonth]);

  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const monthLabel = new Date(viewYear, viewMonth, 1).toLocaleDateString('en-US', { month:'long', year:'numeric' });
  const isCurrentMonth = viewYear===today.getFullYear() && viewMonth===today.getMonth();

  const cells = [];
  for (let i=0; i<firstDow; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const navBtn = { background:'none', border:`1px solid ${T.borderStrong}`, borderRadius:6, width:26, height:26, cursor:'pointer', fontSize:14, color:T.textSoft, display:'flex', alignItems:'center', justifyContent:'center', transition:'background 0.1s' };

  return (
    <div style={{ background:T.surface, borderRadius:12, padding:'16px 20px', border:`1px solid ${T.border}`, boxShadow:'0 1px 3px rgba(0,0,0,0.05)', marginBottom:14 }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ fontSize:16 }}>📆</span>
          <h3 style={{ fontSize:14, fontWeight:700, color:T.text }}>Calendar</h3>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          {onAddEvent && (
            <button onClick={()=>onAddEvent(null)} title="Schedule an event"
              style={{ display:'inline-flex', alignItems:'center', gap:5, padding:'5px 10px', background:T.accentSoft, color:T.accentDeep, border:`1px solid ${T.accentBorder}`, borderRadius:7, fontSize:12, fontWeight:600, cursor:'pointer' }}
              onMouseEnter={e=>e.currentTarget.style.background=T.accentSoft2}
              onMouseLeave={e=>e.currentTarget.style.background=T.accentSoft}>
              <Icon name="plus" size={13} color={T.accent} />Event
            </button>
          )}
          <button style={navBtn} onClick={prevMonth}
            onMouseEnter={e=>e.currentTarget.style.background=T.bg}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>‹</button>
          <span style={{ fontSize:13, fontWeight:600, color:'var(--text)', minWidth:130, textAlign:'center' }}>{monthLabel}</span>
          <button style={navBtn} onClick={nextMonth}
            onMouseEnter={e=>e.currentTarget.style.background=T.bg}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>›</button>
        </div>
      </div>

      {/* Day-of-week headers */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2, marginBottom:3 }}>
        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
          <div key={d} style={{ textAlign:'center', fontSize:10, fontWeight:700, color:'var(--faintest)', paddingBottom:4, letterSpacing:'0.04em' }}>{d}</div>
        ))}
      </div>

      {/* Day cells */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2 }}>
        {cells.map((day, i) => {
          if (!day) return <div key={i} style={{ height:36 }} />;
          const isToday = isCurrentMonth && day===today.getDate();
          const evts = monthEvents[day]||[];
          const types = [...new Set(evts.map(e=>e.type))];
          const hasEvt = evts.length > 0;
          const isMulti = evts.length > 1;
          const isPopOpen = popoverDay === day;

          const goTo = (ev) => onSelectPerson(ev.person.id);
          const handleDayClick = (e) => {
            e.stopPropagation();
            if (!hasEvt) { if (onAddEvent) onAddEvent(dateStr(day)); return; }
            if (evts.length === 1) { goTo(evts[0]); return; }
            setPopoverDay(isPopOpen ? null : day);
          };

          return (
            <div key={i} style={{ position:'relative' }}>
              <div
                onClick={handleDayClick}
                title={!isMulti && evts.length===1 ? evts[0].label : (!hasEvt && onAddEvent ? 'Click to schedule' : undefined)}
                style={{
                  height:36, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                  borderRadius:7, cursor:(hasEvt||onAddEvent)?'pointer':'default',
                  background: isToday?T.accent : isPopOpen?T.accentSoft : hasEvt?T.accentSoft:'transparent',
                  border: isPopOpen&&!isToday ? `1px solid ${T.accentBorder}` : '1px solid transparent',
                  transition:'background 0.1s',
                }}
                onMouseEnter={e=>{ if(!isToday) e.currentTarget.style.background = hasEvt?T.accentSoft2:T.bg; }}
                onMouseLeave={e=>{ if(!isToday&&!isPopOpen) e.currentTarget.style.background = hasEvt?T.accentSoft:'transparent'; }}>
                <span style={{ fontSize:12, lineHeight:1, fontWeight:isToday?700:400, color:isToday?'white':hasEvt?T.accentDeep:'var(--text)' }}>{day}</span>
                {types.length > 0 && (
                  <div style={{ display:'flex', gap:2, marginTop:2 }}>
                    {types.slice(0,3).map(t => (
                      <span key={t} style={{ width:4, height:4, borderRadius:'50%', background:isToday?'rgba(255,255,255,0.85)':EVT_COLOR[t], flexShrink:0 }} />
                    ))}
                  </div>
                )}
              </div>

              {/* Multi-event popover */}
              {isPopOpen && (
                <div onClick={e=>e.stopPropagation()}
                  style={{ position:'absolute', top:'calc(100% + 4px)', left:'50%', transform:'translateX(-50%)',
                    zIndex:200, background:T.surface, borderRadius:10, boxShadow:'0 6px 24px rgba(0,0,0,0.14)',
                    border:`1px solid ${T.borderStrong}`, minWidth:200, padding:'4px 0', whiteSpace:'nowrap' }}>
                  {/* Arrow */}
                  <div style={{ position:'absolute', top:-5, left:'50%', transform:'translateX(-50%) rotate(45deg)',
                    width:9, height:9, background:T.surface, border:`1px solid ${T.borderStrong}`, borderBottom:'none', borderRight:'none' }} />
                  {evts.map((ev, ei) => (
                    <button key={ei}
                      onClick={() => { goTo(ev); setPopoverDay(null); }}
                      style={{ display:'flex', alignItems:'center', gap:9, width:'100%', padding:'9px 14px',
                        background:'none', border:'none', cursor:'pointer', textAlign:'left', transition:'background 0.1s' }}
                      onMouseEnter={e=>e.currentTarget.style.background=T.bg}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <span style={{ width:7, height:7, borderRadius:'50%', background:EVT_COLOR[ev.type], flexShrink:0 }} />
                      <div>
                        <p style={{ fontSize:12, fontWeight:600, color:'var(--text-strong)', lineHeight:1.3 }}>{ev.sub}</p>
                        <p style={{ fontSize:11, color:'var(--faint)', lineHeight:1.3 }}>{ev.label}</p>
                      </div>
                    </button>
                  ))}
                  {onAddEvent && (
                    <button onClick={()=>{ setPopoverDay(null); onAddEvent(dateStr(day)); }}
                      style={{ display:'flex', alignItems:'center', gap:8, width:'100%', padding:'9px 14px', borderTop:`1px solid ${T.border}`,
                        background:'none', border:'none', cursor:'pointer', textAlign:'left', color:T.accentDeep, fontWeight:600, fontSize:12 }}
                      onMouseEnter={e=>e.currentTarget.style.background=T.bg}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <Icon name="plus" size={13} color={T.accent} />Add event this day
                    </button>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Legend */}
      <div style={{ display:'flex', gap:14, marginTop:12, paddingTop:10, borderTop:`1px solid ${T.border}`, justifyContent:'flex-end' }}>
        {[['event','Event'],['meeting','Meeting'],['birthday','Birthday']].map(([t,l]) => (
          <div key={t} style={{ display:'flex', alignItems:'center', gap:5 }}>
            <span style={{ width:7, height:7, borderRadius:'50%', background:EVT_COLOR[t], flexShrink:0 }} />
            <span style={{ fontSize:10, color:'var(--faint)' }}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

/* Is a follow-up something *I* committed to doing (vs. the other person's task or
   a note)? Only first-person commitments belong on my dashboard. We exclude
   "receiving" phrasings ("they'll send me…", "follow up with me") and require a
   first-person / self-task marker ("I will", "I need to", "going to", an
   imperative action verb, "remind me to", etc.). */
const RECEIVE_RX = /\b(sends? me|will send me|gets? back to me|follow(?:s|ing)? up with me|reach(?:es|ing)? out to me|loops? me in|lets? me know|will let me know|emails? me|calls? me|texts? me|will get me)\b/i;
const FIRST_PERSON_RX = /(^|\b)(i['’]?\s?ll|i\s+will|i\s+need\s+to|i\s+have\s+to|i\s+had\s+to|i['’]?m\s+going\s+to|i\s+am\s+going\s+to|i\s+should|i\s+must|i\s+want\s+to|i\s+plan\s+to|i\s+intend\s+to|i['’]?ve\s+got\s+to|i\s+gotta|i\s+owe|going\s+to|gonna|let\s+me|remind\s+me\s+to|my\s+(?:job|turn|task|responsibility)\s+to|need\s+to)\b/i;
const TASK_VERB_RX = /^(send|email|e-mail|call|text|message|reach\s+out|follow\s+up|schedule|book|set\s+up|draft|write|finish|complete|prepare|review|share|forward|introduce|connect|invite|order|buy|pay|sign|submit|check|confirm|plan|create|build|make|research|read|look\s+into|put\s+together|circle\s+back)\b/i;
const isMyCommitment = (t) => {
  const s = (t || '').toLowerCase().trim();
  if (!s) return false;
  if (RECEIVE_RX.test(s)) return false;          // someone else acts toward me
  if (FIRST_PERSON_RX.test(s)) return true;      // explicit first-person commitment
  if (TASK_VERB_RX.test(s)) return true;         // imperative self-task ("Send Aaron the deck")
  return false;
};
// Resolve who owns a follow-up: explicit flag wins, else fall back to the heuristic.
const ownsFollowUp = (conv, text) => {
  const explicit = conv?.followUpOwner?.[text];
  return explicit ? explicit === 'mine' : isMyCommitment(text);
};
// Cycle a follow-up's owner: auto → mine → theirs → auto. Returns a new map.
const cycleOwner = (map, text) => {
  const next = { ...(map || {}) };
  const cur = next[text];
  if (cur === undefined) next[text] = 'mine';
  else if (cur === 'mine') next[text] = 'theirs';
  else delete next[text];
  return next;
};

/* ── Commitments ("homework") — open follow-ups across all conversations ───── */
const CommitmentsSection = ({ people, onSelect, onToggle, onSetOwner }) => {
  const [showDone, setShowDone] = useState(false);
  const { open, done } = useMemo(() => {
    const open = [], done = [];
    people.forEach(p => (p.conversations||[]).forEach(c => {
      const doneSet = new Set(c.doneFollowUps||[]);
      (c.followUps||[]).forEach(text => {
        if (!ownsFollowUp(c, text)) return;      // explicit owner wins, else heuristic
        const item = { person:p, convId:c.id, date:c.date, text };
        (doneSet.has(text) ? done : open).push(item);
      });
    }));
    open.sort((a,b)=>b.date.localeCompare(a.date));
    done.sort((a,b)=>b.date.localeCompare(a.date));
    return { open, done };
  }, [people]);

  const Row = ({ it, isDone }) => (
    <div style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'9px 10px', borderRadius:9, background: isDone ? 'transparent' : T.surface, border:`1px solid ${isDone ? 'transparent' : T.border}` }}>
      <button onClick={()=>onToggle(it.person.id, it.convId, it.text)} title={isDone ? 'Mark as not done' : 'Mark done'}
        style={{ flexShrink:0, marginTop:1, width:18, height:18, borderRadius:5, cursor:'pointer',
          border:`1.5px solid ${isDone ? T.accent : '#cbd5e1'}`, background: isDone ? T.accent : 'white',
          display:'flex', alignItems:'center', justifyContent:'center', padding:0 }}>
        {isDone && <Icon name="check" size={12} color="white" />}
      </button>
      <div style={{ flex:1, minWidth:0 }}>
        <p style={{ fontSize:13, color: isDone ? T.faint : 'var(--text-strong)', lineHeight:1.4, textDecoration: isDone ? 'line-through' : 'none' }}>{it.text}</p>
        <button onClick={()=>onSelect(it.person.id)}
          style={{ display:'inline-flex', alignItems:'center', gap:5, marginTop:3, background:'none', border:'none', padding:0, cursor:'pointer' }}>
          <Avatar name={it.person.name} size={16} />
          <span style={{ fontSize:11, color:T.textSoft, fontWeight:500 }}>{it.person.name}</span>
          <span style={{ fontSize:11, color:T.faint }}>· {fmt(it.date)}</span>
        </button>
      </div>
      {!isDone && (
        <button onClick={()=>onSetOwner(it.person.id, it.convId, it.text, 'theirs')}
          title="Not my task — assign to them and remove from this list"
          style={{ flexShrink:0, alignSelf:'center', fontSize:11, fontWeight:600, color:T.faint, background:'none', border:`1px solid ${T.border}`, borderRadius:99, padding:'2px 8px', cursor:'pointer', whiteSpace:'nowrap' }}
          onMouseEnter={e=>{ e.currentTarget.style.color='#475569'; e.currentTarget.style.borderColor='#CBD5E1'; }}
          onMouseLeave={e=>{ e.currentTarget.style.color=T.faint; e.currentTarget.style.borderColor=T.border; }}>
          Not mine
        </button>
      )}
    </div>
  );

  return (
    <div style={{ background:T.surface, borderRadius:12, padding:'16px 20px', border:`1px solid ${T.accentBorder}`, boxShadow:'0 1px 3px rgba(0,0,0,0.05)', marginBottom:14 }}>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
        <span style={{ fontSize:16 }}>✅</span>
        <h3 style={{ fontSize:14, fontWeight:700, color:'var(--text-strong)' }}>Your commitments</h3>
        <span style={{ fontSize:12, color:T.faint }}>things you said you'd do</span>
        {open.length > 0 && (

const Dashboard = ({ people, onSelectPerson, onAddPerson, onBulkAdd, onLogGroup, onAddEvent, onToggleCommitment, onSetCommitmentOwner, onForgo }) => {
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';

  const allConvs = useMemo(() =>
    people.flatMap(p => (p.conversations||[]).map(c => ({ ...c, person:p })))
      .sort((a,b) => b.date.localeCompare(a.date)),
    [people]
  );

  // Stats
  const now = Date.now();
  const ms30 = 30 * 86400000;
  const convs30 = allConvs.filter(c => now - new Date(c.date+'T12:00:00') < ms30).length;
  const convsPrev30 = allConvs.filter(c => { const d = now - new Date(c.date+'T12:00:00'); return d >= ms30 && d < 2*ms30; }).length;
  const newContacts30 = people.filter(p => p.createdAt && now - new Date(p.createdAt+'T12:00:00') < ms30).length;
  const newContactsPrev30 = people.filter(p => { if (!p.createdAt) return false; const d = now - new Date(p.createdAt+'T12:00:00'); return d >= ms30 && d < 2*ms30; }).length;
  const overdueCount = people.filter(p => getStatus(p) === 'overdue').length;

  // Upcoming (next 30 days), sorted soonest first
  const today0 = new Date(new Date().setHours(0,0,0,0));
  const in30 = new Date(today0.getTime() + 30 * 86400000);
  const upcoming = useMemo(() => {
    const inRange = (ds) => { const d = new Date(ds+'T12:00:00'); return d >= today0 && d <= in30; };
    const items = [];
    // Meetings scheduled from conversations
    allConvs.forEach(c => { if (c.nextMeeting && inRange(c.nextMeeting)) items.push({ key:'m'+c.id, person:c.person, nextMeeting:c.nextMeeting, nextMeetingNote:c.nextMeetingNote }); });
    // Standalone scheduled events (de-dupe group copies by groupId)
    const seen = new Set();
    people.forEach(p => (p.events||[]).forEach(ev => {
      if (!ev.date || !inRange(ev.date)) return;
      if (ev.groupId) { if (seen.has(ev.groupId)) return; seen.add(ev.groupId); }
      const note = ev.participants?.length>1 ? `${ev.title||'Event'} (group of ${ev.participants.length})` : (ev.title||'Event');
      items.push({ key:'e'+ev.id, person:p, nextMeeting:ev.date, nextMeetingNote:[ev.time, note].filter(Boolean).join(' · ') });
    }));
    return items.sort((a,b) => a.nextMeeting.localeCompare(b.nextMeeting)).slice(0, 8);
  }, [allConvs, people]);

  // Catch-up buckets — skip contacts with follow-up off or auto-dropped after 15 months (450d)
  const FORGO_DAYS = 450;
  const buckets = useMemo(() => {
    const b = { mo3:[], mo6:[], mo9:[], mo12:[] };
    people.forEach(p => {
      if (!p.followUpEnabled) return;
      const d = lastConvDate(p) ? daysSince(lastConvDate(p)) : Infinity;
      if      (d >= FORGO_DAYS) return; // auto-drop after 15 months
      else if (d >= 365) b.mo12.push(p);
      else if (d >= 270) b.mo9.push(p);
      else if (d >= 180) b.mo6.push(p);
      else if (d >= 90)  b.mo3.push(p);
    });
    return b;
  }, [people]);
  const catchupTotal = buckets.mo3.length + buckets.mo6.length + buckets.mo9.length + buckets.mo12.length;

  const recent = allConvs.slice(0, 5);

  if (people.length === 0) return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:40 }}>
      <div style={{ fontSize:52, marginBottom:16 }}>👥</div>
      <h2 style={{ fontSize:20, fontWeight:700, color:'var(--text)', marginBottom:8 }}>Start building your network memory</h2>
      <p style={{ fontSize:14, color:'var(--faint)', marginBottom:20 }}>Add your first contact — or paste a whole list.</p>
      <div style={{ display:'flex', gap:8 }}>
        <Btn onClick={onAddPerson}>Add first contact</Btn>
        <Btn variant="secondary" onClick={onBulkAdd}><Icon name="users" size={14} color={T.textSoft} />Add multiple</Btn>
      </div>
    </div>
  );

  const headerBtn = (label, ic, fn, primary) => (
    <button onClick={fn}
      style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'7px 12px', borderRadius:8, fontSize:13, fontWeight:600, cursor:'pointer',
        background: primary ? T.accent : T.surface, color: primary ? 'white' : 'var(--text)',
        border: primary ? 'none' : `1px solid ${T.borderStrong}`, transition:'filter 0.1s' }}
      onMouseEnter={e=>e.currentTarget.style.filter='brightness(0.97)'}
      onMouseLeave={e=>e.currentTarget.style.filter='brightness(1)'}>
      <Icon name={ic} size={14} color={primary ? 'white' : T.textSoft} />{label}
    </button>
  );

  return (
    <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div className="r-pad r-actions" style={{ padding:'16px 28px', background:'var(--surface)', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12 }}>
        <div style={{ flex:1, minWidth:160, display:'flex', alignItems:'baseline', gap:12 }}>
          <h1 style={{ fontSize:20, fontWeight:800, color:'var(--text-strong)' }}>Your Network</h1>
          <span style={{ fontSize:13, color:'var(--faint)' }}>{greeting} — here's where things stand</span>
        </div>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          {headerBtn('Event', 'calendar', () => onAddEvent(null))}
          {headerBtn('Group log', 'msg', onLogGroup)}
          {headerBtn('Add contact', 'plus', onAddPerson, true)}
        </div>
      </div>

      <div className="r-pad safe-bottom" style={{ flex:1, overflowY:'auto', padding:'20px 28px' }}>
        {/* Stats row */}
        <div className="r-stats" style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:18 }}>
          <StatCard icon="👥" label="New contacts (30d)" value={newContacts30} trend={newContacts30 - newContactsPrev30} />
          <StatCard icon="💬" label="Conversations this month" value={convs30}
            trend={convs30 - convsPrev30} />
          <StatCard icon="🔔" label="Overdue follow-ups" value={overdueCount}
            accent={overdueCount > 0 ? '#ef4444' : undefined} />
          <StatCard icon="📅" label="Upcoming meetings" value={upcoming.length}
            accent={upcoming.length > 0 ? 'var(--accent-strong)' : undefined} />
        </div>

        {/* Commitments / homework */}
        <CommitmentsSection people={people} onSelect={onSelectPerson} onToggle={onToggleCommitment} onSetOwner={onSetCommitmentOwner} />

        {/* Calendar */}
        <CalendarSection people={people} onSelectPerson={onSelectPerson} onAddEvent={onAddEvent} />

        {/* Birthday reminders */}
        <BirthdaySection people={people} onSelect={onSelectPerson} />

        {/* Two-column: catch up + upcoming */}
        <div className="r-two" style={{ display:'grid', gridTemplateColumns:'1.5fr 1fr', gap:14, marginBottom:14 }}>
          <CatchUpSection buckets={buckets} catchupTotal={catchupTotal} onSelect={onSelectPerson} onForgo={onForgo} />
          <UpcomingSection upcoming={upcoming} onSelect={onSelectPerson} />
        </div>

        {/* Recent conversations */}
        <RecentSection recent={recent} onSelect={onSelectPerson} />
      </div>
    </div>
  );
};

const MONTHS_LOOKUP = { jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,sept:9,oct:10,nov:11,dec:12,
  january:1,february:2,march:3,april:4,june:6,july:7,august:8,september:9,october:10,november:11,december:12 };
// Parse a loose birthday token → "MM-DD" (or '' if not a date). Accepts 3/14,
// 03-14, 3/14/1990 (year ignored), "Mar 14", "March 14", "14 March".
const parseBirthdayLoose = (raw) => {
  if (!raw) return '';
  const s = raw.trim().toLowerCase().replace(/(\d+)(st|nd|rd|th)/g, '$1');
  const mk = (m,d) => (m>=1&&m<=12&&d>=1&&d<=31) ? `${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}` : '';
  let m;
  if ((m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})(?:[\/\-.]\d{2,4})?$/))) return mk(+m[1], +m[2]);
  if ((m = s.match(/^([a-z]+)\.?\s+(\d{1,2})$/)) && MONTHS_LOOKUP[m[1]]) return mk(MONTHS_LOOKUP[m[1]], +m[2]);
  if ((m = s.match(/^(\d{1,2})\s+([a-z]+)\.?$/)) && MONTHS_LOOKUP[m[2]]) return mk(MONTHS_LOOKUP[m[2]], +m[1]);
  return '';
};
const parseBulkLine = (line) => {
  // "Name", "Name, Company", "Name - Company", "Name (Company)",
  // "Name, Company, 03/14", "Name, March 14"  (a date-like field becomes birthday)
  let s = line.trim(), name = s, company = '', birthday = '';
  const paren = s.match(/^(.*?)\s*\(([^)]+)\)\s*(.*)$/);
  if (paren) {
    name = paren[1].trim();
    const inner = paren[2].trim();
    const b = parseBirthdayLoose(inner);
    if (b) birthday = b; else company = inner;
    const tail = paren[3].trim().replace(/^[,\-|—]\s*/, '');
    if (tail) { const tb = parseBirthdayLoose(tail); if (tb) birthday = birthday||tb; else company = company||tail; }
    return { name, company, birthday };
  }
  const parts = s.split(/\s*(?:,|\||—|\s-\s)\s*/).map(p=>p.trim()).filter(Boolean);
  name = parts[0] || '';
  for (const part of parts.slice(1)) {
    const b = parseBirthdayLoose(part);
    if (b && !birthday) birthday = b;
    else if (!company) company = part;
  }
  return { name, company, birthday };
};
